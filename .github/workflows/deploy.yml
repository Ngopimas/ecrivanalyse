# Build the Astro site (+ Pagefind index) and publish dist/ to GitHub Pages.
# Every push to main redeploys - including the commits made by the réponses
# approval endpoint, so an approved comment goes live in minutes.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      # BASE_PATH/SITE_URL: the site lives under /ecrivanalyse/ on GitHub Pages.
      # When the custom domain is attached, delete these two env lines (and set
      # the domain in the Pages settings) - the defaults take over.
      - run: npm run build
        working-directory: site
        env:
          BASE_PATH: /ecrivanalyse/
          SITE_URL: https://ngopimas.github.io
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # the ~280 MB artifact makes deploy-pages flaky ("Deployment failed, try
      # again later"); a second attempt has always gone through
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
