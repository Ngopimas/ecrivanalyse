text: |-
  Le père de Lucie voulait une fille. C’était là qu’allait sa préférence ; et c’est pour cette raison qu’il fut si ému le jour de sa naissance. Une fille ! Lucie advenait exactement là où allait la préférence de son père. Mais alors, cette reconnaissance, se portait-elle bien du coup sur Lucie ? sur elle-même ? <i>en tant que</i> Lucie ? ou n’était-ce pas plutôt <i>en tant</i>... <i>qu’étant</i>... cette fille qu’il appelait de ses vœux ?...
  C’est ainsi que commence l’histoire de cette petite fille née en Corrèze, dans le Limousin, le 12 décembre 1941 ...
  De fait, il y a même encore ce point amusant, remarquable dans l’histoire géographique de Lucie qui est que c’est <i>à</i> Corrèze même ! <i>en</i> Corrèze ! qu’elle est née : dans cette petite commune du canton de Tulle, près de Saint-Augustin.
  Ainsi, là-bas, ce jour-là, les choses se présentaient-elles sous de si bons auspices que cela ?...
