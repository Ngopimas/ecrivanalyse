text: |-
  Vous savez, la petite Lucie, elle a failli <i>tourner de l’œil</i> lorsque son petit frère, le petit Georges, est né. D’ailleurs, ne serait-ce qu’une fraction de seconde, un instant de raison, c’est bien ce qui a dû se passer : elle a <i>tourné de l’œil</i>. Voulait-elle ne pas voir l’évidence ? Ne le pouvait-elle pas ?
  Vous savez, si on essaie de dater un peu tout cela, il y a tout de même quelque chose d’assez troublant : c’est à peu près à partir de la naissance de son cadet que Lucie a commencé à maigrir - <i>je maigris, tu m’aigris</i>... Elle observait les choses autour d’elle ; les changements et ce qui ne bougeait pas. Il y avait des choses qu’elle ne comprenait pas.
  Georges était très beau. C’était un très joli garçon, vraiment. Il avait des traits d’une finesse incroyable. Leur maman, à <i>lui</i>, Lucie.. et Jacques, <i>lui</i> laissa porter assez longtemps les cheveux étonnamment longs. Célestine, de fait, trouva très vite cela bien incongru, et même de plus en plus, ce garçon avec des cheveux <i>si</i> longs. Mais Françoise tint bon. Elle tint bon devant la grand-mère. Lucie obervait tout cela...
  Lucie se demandait pourquoi sa mère n’avait pas tenu bon devant Antoine, le grand-père, lorsque celui-ci avait braillé : “Danseuse ?! Ah, ça ! Pas question ! Pas de putain dans la famille !”
  Vous savez, je crois bien que Lucie se demandait alors en fait si sa mère ne tenait pas plus à Georges qu’à elle-même.
  Il y avait comme un lien entre eux, depuis le début...
  Elle en était sûre, même. Elle avait constaté, senti cela bien avant la naissance de son frère. Un matin, alors que Françoise était enceinte, un piéton l’avait bousculée sur le chemin de l’école. Elle s’était alarmée : “Mon Dieu ! Pourvu qu’il ne se soit pas décroché !” Oui, elle en était sûr : il y avait entre ces deux-là un lien, qui tenait ; qui avait toujours tenu, <i>lui</i>, depuis le début...
