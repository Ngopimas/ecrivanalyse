text: |-
  Un été qui n’a pas le goût de l’été. Je crois.
  Ici, plus particulièrement ici, l’été, c’est les vacances. Or, ce ne sont pas de véritables vacances... D’ailleurs, ce mot : <i>vacances</i>, la <i>vacance</i>, la <i>vacuité</i>, le <i>vide</i>...
  Voilà que j’associe mon frère à du vide, à présent ; mon cadet. Avec lui est arrivé pour moi un certain vide ; je me suis vidée, d’une certaine façon. J’ai maigri, j’ai perdu le père qui me faisait des nattes quand nous attendions tous la naissance de ce <i>dernier enfant</i>..., j’ai fait la connaissance d’un silence angoissant, et, plus tard, bien plus tard, petit à petit, une à une, j’ai vu se dissocier mes maisons de l’île de Ré.
  Quand passerai-je enfin des vacances, dans ma maison, à l’île de Ré ?...
