text: |-
  C’est l’histoire qui raconte des histoires.
  C’est une histoire qui a eu des histoires.
  C’est l’histoire qui en fait des histoires.
  C’est une histoire qui s’attire des histoires.
  C’est l’histoire d’un tas d’histoires.
  C’est une histoire à histoires.
  C’est l’histoire des histoires à n’en plus finir.
  C’est une histoire : pas d’histoires !
  C’est l’histoire de <i>La petite fille à côté</i> qui raconte des histoires de la petite fille à côté.
