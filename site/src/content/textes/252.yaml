text: |-
  Que vous dire de plus aussi, après tout...
  Vous savez, il y a ces mots qui me sont venus : <i>Dépossession</i> et <i>(ré)appropriation</i>...
  Je me sens dépossédée des maisons de l’île de Ré... qui sont pourtant <i>mes</i> maisons ! <i>mes</i> maisons de l’île de Ré !...
  Je vous ai parlé de la danse aussi, vous vous souvenez ?
  Eh bien, comme je vous le disais, il me semble que la danse me permet un travail de réappropriation... Et d’ailleurs, ce n’est même pas un travail... Quand je danse, je ne travaille pas, <i>je me réapproprie</i>. Mais, savez-vous, selon une expression que l’on pourrait entendre de deux façons : « Je me réapproprie... » sous-entendu quelque chose - comme, par rexemple, un peu de <i>mes</i> maisons de l’île de Ré ?... -, et : « Je me réapproprie » comme si le verbe pouvait se conjuguer à la forme pronominale, c’est-à-dire alors comme si c’était aussi de moi-même que je reprenais le contrôle.
  Quand je danse, j’ai le sentiment que, de là où je suis, d’où je me trouve, personne - oh non ! ça, c’est bien sûr, personne ! - ne peut me chasser ! La danse, le fait de danser érige entre moi et le monde des murs immatériels, infranchissables, <i>inviolables</i>... Et, pourtant, paradoxalement, alors, dans le même temps, vous savez, je me sens aussi, c’est vrai, oui, en pleine communion avec lui, avec ce même univers !
  C’est amusant... ça me fait rire... mais je ne sais pas si je peux le dire ici : la danse, si vous voulez, d’un certain côté - de ce point de vue, précisément -, c’est un peu ma quadrature du cercle réalisée, ma jouissance simultanée du beurre et de l’argent du beurre. Quand je danse, tout est possible ! Même l’impossible ! Surtout l’impossible !...
  Mais, j’y pense ! Vous vous êtes peut-être demandé où exactement, sur l’île de Ré, se trouvaient mes maisons (tiens, étonnant, j’ai dit naturellement mes maisons...) !
  Quelque chose serait-il en train de...
  J’ai du mal à y croire...
  Que quelque chose puisse encore changer aujourd’hui...
  Pourtant...
  Pourtant, là, tout à coup, j’ai très envie de vous dire où, sur l’île, sont localisées mes maisons... Et je le dis bien ! je le redis ! je le claironne à qui veut l’entendre : <i>mes</i> maisons, pas celles de quelqu’un d’autre !
