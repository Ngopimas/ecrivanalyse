text: |-
  Cela dit, ce matin, Lydie est en retard...
  Bien sûr, en général, il n’y a pas d’horaires qui s’imposent aux membres de la <i>Brigade</i> ; puisque, aussi bien, il n’y en a pas d’autres que ceux de leur passion. Cependant, cette fois, l’<i>Amirale</i> leur a donné à tous rendez-vous à 10 heures précises, afin que l’équipe soit intégralement présente au moment de la visioconférence qu’ils ont obtenue avec le professeur Braün de l’Université d’Adelaïde. Laurence ne voulait surtout pas abuser de la gentillesse dont avait déjà fait preuve ce dernier en leur accordant cette faveur malgré l’important décalage horaire. Il fallait à tout prix, pour elle, éviter de l’obliger encore à rester trop tard à son travail pour leur parler.
  Malgré cela, Lydie est en retard... Elle imagine les autres l’attendant avec impatience au <i>Taf</i>... Elle vient juste d’arriver devant le numéro 10. Enfin ! Il est 10 heures 15... Elle est tout essoufflée. La rue des martyrs est déjà bien animée, surtout dans cette partie très commerçante. Lydie est vraiment très essoufflée. Elle a remontée la rue en courant, depuis Cadet. Elle a la bouche grande ouverte... Elle s’appuie presque autant sur le premier digicode qu’elle ne compose le numéro... La porte cochère est passée !... À droite, la première porte vitrée : le second digicode... La voilà à présent dans le sas, avec, à sa droite encore, la loge de la gardienne... « Bonjourrfff !! »... Le bouton, le petit bruit électrique caractéristique, le pêne qui se déclenche : voilà qui est fait pour la seconde porte vitrée du sas !... « Muf muf !! »... Il faut encore monter !!... Au point où elle en est... Lydie... « Ouf ! ouf !  »... Les marches : deux à deux !... L’escalier était à gauche après le sas... c’est déjà loin... Comme elle va vite !... Celui-là monte en tournant sur la droite... C’en est fait aussi maintenant du premier palier (les deux grandes doubles portes avaient encore chacune le courrier sur leur paillasson respectif)... C’est le second ! Déjà l’étage du local !... Droite !!... Elle n’a même plus pris le temps de regarder si le courrier se trouvait aussi devant la grande porte de face du second palier... Lydie !... C’est le long couloir ! Le poids de sa course résonne sur le parquet... Ouf !... Mf !!... La cour intérieure défile par les grands carreaux de la baie à gauche... et les portes des appartements qu’elle longe... à droite... qui longent la cour... « Uouff ! »... Lydie commence à être un peu étourdie... Cela défile de chaque côté du couloir, du long couloir... déjà parcouru !... Au fond, ... Là !... Maintenant !... « Pffff ! »... déjà le local...
  Le quartier général de la <i>Brigade symbolique</i> - qu’ils appelaient aussi, bien sûr, la <i>Cabine</i>  !... - comportait une petite entrée avec, à droite, la cuisine puis les toilettes, au fond, un minuscule prolongement vers le bureau, et enfin, à gauche, la grande pièce principale avec son immense verrière qui mangeait de clarté  tout le mur de façade... Et où l’accueillit tout le reste de l’équipe !

  Fluides - Partie I - Chapitre VI
