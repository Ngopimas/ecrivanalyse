text: |-
  Tu parles ! En fait, je n’ai toujours rien osé. La période que je vis est véritablement difficile. Élisabeth était enjouée, comme à son habitude. Moi, intérieurement, je ne cessais de gamberger. Dois-je lui dire ? Que lui dire ? Je me sens tellement pressé par le temps, en ce moment ! Et cette année universitaire qui n’en finit pas... de toucher à sa fin ! Comment vais-je m’en sortir ? J’aimerais apporter mon grain de sel à l’histoire, à l’enquête. Bien sûr, j’en ai les moyens. Mais j’ai tellement peur, par ailleurs, de me précipiter, de tout gâcher. Tenez, par exemple, je ne pouvais tout de même pas lui dire, à Élisabeth, lorsqu’elle est venue chez moi, que Lydie était sur la bonne piste en se rendant à Authezat ! Si ? Cela m’était pourtant impossible de lui apprendre qu’il s’agit du village où est né le bas-lanceur ; le <i>bas-lanceur</i>, et sa mère aussi, d’ailleurs. Comment lui expliquer que je sais cela depuis longtemps ? Comment lui faire part des circonstances dans lesquelles je l’ai appris ?...
  Et ce temps qui file ! Qui file toujours plus vite, j’ai l’impression !
  Dois-je me faire connaître de la <i>Brigade</i>  ? Dois-je le faire d’une façon plus directe que celle que j’ai pour l’instant retenue en me faisant passer pour cet homosexuel sado-maso un peu loufoque auprès d’Élie ? Je suis totalement perdu. Et dire que je connais Charles ! Que je sais où il habite ! Que je sais, par conséquent, où est hébergé Tintis, alias le <i>bas-lanceur</i>... alias, surtout, Paul Aguillon, né à Authezat, le 23 octobre 1961.
  En fait, je crois que j’ai peur d’agir. Il va me falloir essayer encore, quitte à faire une erreur. Je ne peux plus rester davantage immobile. Que faire ? Je dois lâcher quelque chose. Je dois accepter le risque du plongeon, je dois me lancer dans les airs. Mais en quoi cela pourrait-il bien consister ? Je dois contacter quelqu’un ! Cela n’a pas marcher avec Élisabeth ? J’ai manqué de courage ? Qu’importe ! Il me faut faire un autre pas, continuer à avancer. Et tant pis, si je me trompe : je ne peux plus rester comme cela. Je vais contacter la <i>Brigade</i>...
  - Allo, Élie, c’est Fred.
  - Oh non ! Fred, je suis désolé, mais je n’ai vraiment pas le tem...
  - Non ! Écoute-moi, Élie, c’est important. Je t’ai menti. Je ne m’appelle pas Fred. Je m’appelle Pascal. Pascal Sosia. Il faut à tout prix que je te voie. C’est à propos de votre enquête...
  - De notre... Quoi ! Tu es au courant ?
  - Oui. Élie, je sais où se trouve le <i>bas-lanceur</i>.

  Fluides - Partie III - Chapitre II
