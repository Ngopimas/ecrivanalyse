text: |-
  Voici : Toute cette histoire vient de plus loin. Elle <i>pro-vient</i>... <i>pro-longe</i>... <i>pro-cède</i> de quelqu’un d’Autre. Avant. Ailleurs. Il faut remonter jusque-là. L’histoire de Lucie et Humain est le <i>pro-grès</i> d’une autre ; son <i>pro-jet</i>, aussi, en quelque sorte...
  Il s’agit d’un homme ; d’un homme très important ! Je ne vais pas tarder à vous le décrire. Disons que cela viendra, en son temps. Aujourd’hui - à cette époque -, nous sommes en 1941. Nous entrons dans la pièce où se trouve cet homme. Les choses doivent se mettre tout doucement en place. Il ne fait pas très clair dans la pièce. Ce n’est pas comme le visage de l’homme ; de ce troisième personnage - <i>soudain</i> !...
  Il entre dans la pièce (nous sommes même un peu avant, donc, notre propre entrée). Il prend son temps. Non ! peut-être se précipite-t-il vaguement, au contraire ; nous ne savons pas bien. Mais le visage de cet homme, l’étincelle de son regard sont éminemment lumineux !
  ... Cela s’est passé pendant son absence. Il entre, très ému ; souvent, dans ces cas-là, on emploie l’expression : <i>avoir le cœur gonflé</i>...
