text: |-
  La rue des Martyrs. Abbesses. Le quartier-décor s’installe. Cela fait maintenant cinq bons mois qu’Élisabeth y est elle-même installée. En ce début de décembre qui commence, le froid lui aussi prend sa place...
  C’est ce soir-là, le 8, qu’elle l’a vu pour la première fois. Je ne vous cache pas qu’une certaine émotion me prend au moment de vous raconter cela...
   Après être retournée une première fois chez elle, une fois sa journée de travail terminée, Élisabeth s’apprêtait à reprendre le métro. Elle ressortait. Elle était invitée... chez des amis ! mettons, <i>par exemple</i>...
  Je ne sais pas si vous connaissez Abbesses, la station de métro Abbesses. Si ce n’est le cas, sachez que c’est un endroit assez étonnant. À vrai dire, c’était aussi un peu pour cela, parce qu’elle adorait cette station si particulière, qu’Élisabeth avait fait le forcing l’été dernier pour décrocher son cher « 95 » ; et ce, bien que celle-là eût été fermée pour travaux - on s’en souvient -, le jour de la visite.
  À trente mètre sous le niveau du sol, Abbesses est la station la plus profonde du réseau parisien. Elle est équipée... elle était alors équipée - <i>ce soir-là</i>... -, enfin ! d’ascenseurs très modernes. La surface et les quais étaient néanmoins aussi toujours reliés, l’une aux autres, par deux interminables escaliers en colimaçon ; l’un, réservé à la montée, l’autre, à la descente. Bien évidemment, Élisabeth préférait, aussi souvent que possible, emprunter ces escaliers. Aujourd’hui... <i>ce soir-là</i>... elle partait ainsi pour une nouvelle descente.
  Il était si beau, si insolite, aussi, son escalier <i>calimaçonnemment</i> descendant d’Abbesses ! Si joliment décoré de surcroît ! À une époque, l’intégralité de son mur <i>périphérique</i> était même ornée d’une fresque. Malheureusement, celle-ci avait vite été recouverte par les tags. Aujourd’hui... <i>ce soir-là</i>... la décoration était nouvelle : de grandes affiches consistant en d’immenses photographies sur le thème de la Butte Montmartre recouvraient la vertigineuse courbe de la paroi. C’était moins beau que la fresque, certes, mais malgré tout assez grisant à longer, pour Élisabeth, au cours de ses descentes tournoyantes ; et puis, à présent, au moins (ou hélas... - c’était selon la valeur artistique que chacun attribuait aux bombages), les tags pouvaient facilement s’effacer des affiches qui étaient justement imprimées sur un papier spécial traité pour cela.
  Mais Élisabeth n’a pas encore descendu sa première marche... Elle le voit ! Il est là ! C’est la première fois qu’elle le voit... Un vagabond ? un clochard ? un SDF ? que faut-il dire  ?...
  L’homme se tenait au bord de cette première marche de l’escalier. Il était lourdement - apparemment, chaudement - fagoté. Il se balançait étonnamment. En avant, en arrière. En avant, en arrière...
  Élisabeth pense à Dustin Hoffmann dans <i>Rain Man</i>... Est-il handicapé ?... L’était-il ?... Elle y pense déjà au passé - la descente a débutée : commencé, le <i>colimaçonnage</i> !... -, mais cette image est encore <i>impressionnée en elle</i>. Voulait-il se jeter dans l’escalier ? Est-il « dérangé » ? Etait-ce encore l’une de ces âmes <i>perdues</i> comme il s’en... <i>trouve</i> dans les rues et le métro parisiens ?...

  Fluides - Partie I - Chapitre VII
