text: |-
  L’après-midi est grise. Sonia n’a pas envie de travailler. Et puis, cette Sophie, alors ! Exaspérante au possible ! Elle lui a encore téléphoné, voilà quelques minutes. Comme si cela ne lui suffisait pas de se débattre avec ce dernier devoir donné par Pascal. Déjà qu’elle n’a jamais trop rien compris à cette espèce de début de roman, <i>Fluides</i>  ! Oui bon, mais encore ? Sonia a, de toute façon, toujours eu plus de goût pour les œuvres bien structurées. Finalement, elle est peut-être définitivement plus <i>Dix-neuvième</i>. Le contemporain ? Bof ! Mais alors ! Avec maintenant ce travail de liaison à établir entre le texte donné avant Noël et cette fumeuse nouvelle idée ! Ce pseudo-nouveau-personnage-potentiel-Odile-Quélen-professeur-à-Saint-Lô  ! Non, vraiment, cela devient du grand n’importe quoi ! Elle n’a pas besoin de cela pour s’inquiéter pour son avenir. Elle sait déjà tout ce qui se dit et se publie, en termes de statistiques, au sujet des débouchés - leur quasi-absence, en fait - offerts par les études littéraires, et, encore plus, quand elles sont suivies à l’université.
  Sonia n’aime pas <i>Fluides</i>. Voilà tout. Pour elle, ce texte n’a ni queue ni tête, ne mène nulle part...
  Sonia n’aime pas Sophie. Elle sent que cette fille tente - peut-être inconsciemment, certes, mais sûrement - de la phagocyter. Elle n’arrête pas de lui parler d’elle. Elle lui a déjà confié tant de choses intimes, sur sa vie, son enfance, sa famille. Mais que veut-elle rattraper, à la fin, par son intermédiaire ! C’est comme si elle voulait se racheter de quelque chose. Cela rend Sonia mal à l’aise. Cela empêche Sonia de travailler... Le travail donné par Pascal, lui-même, l’empêche de travailler. Ce n’est pas du travail. C’est une élucubration. En fait, Sonia se demande si elle ne va pas arrêter ses études.
  Mais, tout à coup, elle a cette pensée : pourtant, au début, la découverte de <i>Fluides</i> lui avait bien procuré un réel sentiment d’enthousiasme. Ce serait alors uniquement Sophie ?...
  Le téléphone sonna de nouveau. Sophie ! Sonia ne répondit pas. Elle sentit monter en elle une étonnante colère.
  <i>Fluides</i>, au moins, valait mieux que cela, mieux que cette fille et son délire. Il faudrait garder ses distances.
  ... Alors, après quoi courait finalement la <i>Brigade</i>  ? À quel moment et pour quelle(s) raison(s) le chemin de son investigation serait-il amené à croiser celui d’Odile Quélen ?...

  Fluides - Partie II - Chapitre VIII
