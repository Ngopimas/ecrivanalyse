text: |-
  Je vais vous dire. Le problème, c’est qu’au début, ça part dans tous les sens. Or, je déteste ça !
  En tout cas, Laurence, elle, c’est sûr, déteste ça !
  À la fois, elle a envie de prendre une pléthore de directions, mais, dans le même temps, elle souffre surtout de son impuissance face aux rares pistes dont les membres de la <i>Brigade</i> disposent. Elle s’agite. Ça y est ! Ça lui reprend ! Elle s’énerve, s’impatiente !...
  « V’là encore l’<i>Amirale</i> qui s’est enfermée dans l’bureau, dites donc ! » Michel a beau essayer de détendre l’atmosphère, à chaque fois, c’est pareil : cette disposition au stress de Varennes a tendance à se communiquer reste du groupe. Au moins, Christiane a la perspective de pouvoir aller s’aérer :« Bon, je vous laisse. Moi, je dois filer, si je ne veux pas être à la bourre pour relever Lydie à Abesses ! »
  ...
  « Ah ben ! Il était temps ! Moi, j’allais finir par prendre racine ici. C’est chiant, de poireauter comme ça ! J’arrête pas de faire des allers-retours. Les tourniquets ! Le kiosque à journaux ! Les guichets ! Les portes des ascenseurs ! Le haut de l’escalier !... Et puis alors, tu vas voir : tous ces gens qui prennent le métro ! On s’imagine pas le nombre ! Au moins, ça fait une récréation ! Y a de ces gueules, Christiane, tu vas pas en revenir ! - Bon, mais toujours pas vu le bonhomme ? - Rien à signaler ! Je suis malgré tout restée concentrée sur l’objectif, rajoute Lydie dans un dernier mime ironique du bidasse au rapport, mais rien ; vraiment rien...  »
  Pendant ce temps-là, au <i>Taf</i>, l’ambiance s’échauffe encore un peu plus. « Mais voyons, Laurence ! moi, je ne demande pas mieux que de faire le profil psychologique du vagabond, l’étude de son comportement, et que sais-je encore ? mais entends-moi quand je te dis que je manque pour l’instant par trop d’élément ! Il n’y a rien ! On n’a rien ! Il faut au... - Mais, bon sang, Élie, tu peux quand même nous commencer quelque chose, merde ! Tu as le récit que nous a fait Élisabeth ! - Écoute, Laurence, ça ne sert à rien de t’énerver. On ne va pas aller plus vite que la machine. Bien sûr, je vais commencer par ce récit - je vais d’ailleurs demander à Élisabeth de m’accorder, dès qu’elle en aura l’occasion, un entretien, pour qu’on revoit ensemble tout ce qu’elle peut m’en dire à nouveau, au calme, à froid - mais je maintiens qu’il nous faut avant tout le retrouver notre énergumè... »
  « Attendez ! Eh, venez voir, j’ai peut-être quelque chose ! »
  La journée a été longue. C’est la première de l’enquête. Il y a de l’électricité dans l’air. Il est tard. Et tous - tous ceux qui sont présents : Laurence, Élie, Élisabeth et Lydie (déjà revenue : la station n’est décidément pas loin !) - se sont brusquement retournés, et d’un seul mouvement, vers Michel qui vient de pousser cette exclamation. Il est encore dans la pose qu’il n’a pas quittée depuis qu’il a commencé ses recherches : courbé sur sa petit table de travail, celle réservée aux investigations scientifiques...
  « Regardez ce que j’ai trouvé !... »

  Fluides - Partie I - Chapitre XXIX
