text: |-
  Voilà l’histoire : Il faut remonter un peu dans le temps. Dans le tunnel (c’est le cas de le dire !). Il a fallu plusieurs jours avant que l’on ne retrouve le <i>bas-lanceur</i>, en décembre, après l’épisode de la rame de métro...
  Il avait faim. Il ne parlait pas. Pour la soif, il avait trouvé et utilisé un robinet de service. Ils ont très vite fait le rapprochement. Il correspondait bien au signalement qu’avaient donné les passagers : c’était le vagabond du début d’incendie. Bien sûr, ils ne trouvèrent aucuns papiers sur lui.
  Dans ces cas-là, il y a plusieurs solutions. Pour le <i>bas-lanceur</i>, le SAMU social a opté pour une orientation en CHUS (centre d’hébergement d’urgence simple). Il ne nécessitait pas de soins infirmiers particuliers. C’est là-bas, une fois arrivé à Yves Garel, dans le XIème, que Paul, un ami de... Charles Desmois...
  C’est-à-dire qu’il a tout de suite fait l’association d’idée : il s’agissait de réussir à expliquer au nouvel arrivant qu’il pourrait très vite aller bénéficier des repas chauds - et peut-être même des colis alimentaires ! - des <i>Restos du cœur</i>  ; seulement, à cause de son « espèce d’aphasie  », il était très difficile de communiquer avec lui. Or, Charles, justement, l’ami de Paul, donc, son vieux poteau, était à la fois bénévole aux <i>Restos du cœur</i> et... orthophoniste !
  Voilà. C’est la rencontre. La triste rencontre. Apparemment un petit coup de pouce du destin pour le <i>bas-lanceur</i>. Oui, on pourrait être tenté de le croire. Cependant, je confirme : pour lui, une bien triste rencontre. Il n’avait vraiment pas besoin de cela.
  Ni personne, d’ailleurs...

  Fluides - Partie I - Chapitre XXVI
