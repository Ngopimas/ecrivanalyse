text: |-
  « Bonjour, Michel ! La pêche ?! »
  Chaque matin, c’était à peu près de cette même manière tonitruante que Christiane saluait chacun de ses partenaires lors de son arrivée au « taf », ainsi que tous les membres de l’équipe de Varennes appelaient affectueusement leur travail - s’il est encore approprié de qualifier une telle expérience, même collective ! de travail - ou, indifféremment, les locaux dans lesquels, pour exercer celui-là, ils avaient établi leur quartier général.
  De fait, l’<i>Amirale</i>, comme ils avait aussi pris l’habitude de la surnommer, et ce, aussi bien entre eux qu’en s’adressant à elle, avait si bien su insuffler dans leur groupe une solidarité digne des équipages les plus aguerris et les plus soudés par les épreuves accumulées au cours de longues années de navigation en commun, que, de l’affection - même si la pudeur générale eût proscrit l’usage d’un tel mot -, c’était bien ce qu’avait fini par ressentir tous ces originaux, les uns pour les autres, tout autant que pour la sorte de défi qui les avait réunis.
  En cela, Laurence Varennes avait indéniablement joué, là encore, dès le départ, un rôle fondamental. Mais aussi, comment aurait-il pu en être autrement ? C’était elle, après tout, qui avait créé la <i>Brigade</i> ! À certains moments même, à y repenser, l’idée pouvait sembler à ce point folle, forcément irréelle, que l’on aurait pu préférer dire qu’elle l’avait <i>inventée</i>...
  Et certes, il fallait bien qu’ait germé un jour dans l’imaginaire étonnant de cette rêveuse-née cette apparente lubie de plus en quoi consistait la <i>Brigade symbolique</i>, pour qu’en d’autres respectives occasions, Élie, Christiane, Lydie et Michel, quatre autres farfelus alors inconnus d’elle, pussent n’avoir plus, à partir de là, que le seul, unique et commun désir de la rejoindre dans son projet exaltant, à leur yeux. Tout autre qu’eux, en effet, l’eût appelé sa chimère. Cependant, nos quatre électrons libres se réjouissaient bien trop, quant à eux, d’avoir rencontrer ce cinquième phénomène dont la déconcertante démarche, si intuitivement volontaire, leur donnait envie d’y harmoniser leurs mouvements. Et, de fait, c’était par cette reconnaissance même donner pleinement vie au rêve de l’Amirale, tout en se destinant à devenir, du même coup, dans cette singulière aventure, ceux qui étaient aujourd’hui les fiers acolytes de Laurence Varennes.

  Fluides - Partie I - Chapitre V
