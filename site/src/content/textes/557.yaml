text: |-
  À quoi tiennent les choses tout de même...

  Il est vrai que ce jour-là un certain sentiment de renouveau animait le cœur d’Élisabeth. Mais après tout, bien peu de gens s’en vont visiter un nouvel appartement, lorsqu’ils en cherchent un, sans ce léger vertige d’excitation pour l’inconnu qui s’ouvre alors à eux. Et les questions, dans un pareil état, de se bousculer irrésistiblement en leur esprit : « Vais-je finalement choisir ce logement-là ? », « Sera-ce, cette fois, la véritable habitation de mon bonheur ? », « Me maudirai-je, au contraire, un jour, d’avoir fait un tel choix ? », <i>et cætera</i>.

  De toute façon, il ne restait plus à la jeune femme qu’un mois et demi pour hésiter, dans la mesure où son actuel bailleur lui avait déjà donné son préavis depuis le même délai. Le temps pressait.

   Aujourd’hui, elle se rendait au 95, rue des Martyrs, dans le 18e arrondissement de Paris.

  La rue des Martyrs s’étend en fait - l’on devrait plutôt dire <i>monte</i> - sur deux arrondissements : le 9e et le 18e. Au numéro 95, l’on se trouve dans la partie la plus haute de la voie, coincé entre la rue Vieuville et la rue Yvonne-Le-Tac ; pas très loin du Sacré-Cœur, et à deux pas de la station de métro Abbesses.

  Élisabeth avait raison, pour cette fois, de penser que cette visite allait peut-être changer sa vie. Simplement, elle était loin d’imaginer de quelle façon et à quel point ; loin de se douter en quoi le fait d’être à quelques heures de choisir cet appartement du quatrième étage de ce modeste immeuble du 95 de la rue des Martyrs, devant lequel elle se trouvait à présent, allait être - sans doute associé à quelque autre caractéristique propre à sa nature - le catalyseur de toute cette étrange histoire dont il s’agit maintenant de faire le récit dans ces pages.

  Tout est cependant déjà dit, à peu de choses près. Peut-être, certes, n’a-t-il pas encore été précisé qu’Élisabeth ne possédait pas de voiture. Oui, il est pourtant nécessaire de le dire. Ou finalement, non ! En fait, l’essentiel est sans doute davantage d’indiquer que, pour se rendre à ce rendez-vous proposé par l’agence, elle était venue en métro.

  La vie tient tout de même à bien peu de choses...

  Fluides - Partie I - Chapitre I
