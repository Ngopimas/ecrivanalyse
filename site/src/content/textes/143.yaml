author: "Annick Lebédyk , Ivan Joseph"
text: |-
  Elle est une petite fille ! Elle a toujours été une petite fille ! C’est comme ça que ça a commencé ! C’est important ! c’est son histoire ! ça a commencé comme ça ! tout de suite ! Vous entendez ! ça veut dire qu’elle est pas une fille qui est grande ! et ça veut dire aussi qu’elle est une petite-fille ! à sa grand-mère ! au lieu d’être une fille ! à sa mère ! vous comprenez ! C’est une histoire ! dès le début ! un mensonge ! Quand elle était petite, elle devait inventer son histoire ! elle croyait que les choses bougeaient pas alors elle est toujours une petite fille ! la seule différence, c’est qu’aujourd’hui elle est une GRANDE petite fille ! Elle, elle sera jamais une <i>vieille fille</i> ! Si un jour elle est vieille, elle sera une <i>vieille PETITE fille</i> ! C’est SON histoire ! On lui a menti ! alors elle a menti ! La première couleur de sa vie, c’était gris ! C’est son histoire ! C’est pour ça qu’elle est belle ! On lui a menti ! alors elle a menti ! Elle a fait comme si de rien n’était ! Ils voulaient que les choses restent toujours comme ça alors qu’elle savait très bien qu’elles étaient pas comme ça ! alors qu’elle l’avait toujours su et qu’on le lui avait annoncé ! Eh ben ! elle a menti aussi ! elle a inventé ! elle a imaginé ! Elle a fait comme si les choses pouvaient toujours rester comme ça ! Elle a fait comme si c’était possible qu’elle reste toujours une petite fille ! La petite fille en couleur ! Au début, la première couleur de la petite fille, c’était le gris ! C’est le mélange du noir et du blanc ! comme dans la télé qui était au bout de son lit ! elle a transformé le bout de son lit !
