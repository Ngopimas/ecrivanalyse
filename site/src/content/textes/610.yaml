text: |-
  L’aventure se poursuit. Tout à coup, coup de théâtre ! Lydie débarque pendant le repas. Elle est de retour d’Authezat. Pascal surprend toute l’assemblée en révélant avant elle les informations qu’elle a pu glaner pendant son voyage. Il savait déjà.
  Une fois de plus, c’est Michel qui, le premier, met les pieds dans le plat :
  - Bon, soyons clairs. Il faudrait peut-être enfin se décider à faire cesser cette mascarade ou, tout du moins, ce qui est en train de le devenir. Bref, que faisons-nous dans cette histoire ?!
  - C’est vrai, continue Lydie, moi aussi j’en ai marre. Je cours dans tous les sens, je prends le train, et tout et tout, pour aller chercher des informations. Résultat : quand enfin je reviens avec quelque chose d’intéressant, je vous retrouve en train de vous la couler douce autour d’un bon plat avec un type qui est déjà au courant de ce que j’ai découvert !
  Élie et Christiane, de façon certes plus timorée, finissent par ajouter leur note à l’expression du mécontentement général.
  L’aventure est à un tournant. <i>Fluides</i> a perdu de son sens. <i>Fluides</i> ne coule plus ! Il y a barrage. Un obstacle. Sera-t-il suffisamment imposant pour circonscrire  le développement de l’élan déjà pris ? Ou bien, au contraire, la force d’inertie de ce mouvement amorcé permettra-t-elle de renverser ou encore contourner cette nouvelle contrainte ? L’adaptation est-elle possible ? Le souffle s’estompe, la flamme s’étiole.
  Aujourd’hui, les personnages de <i>Fluides</i> nous regardent. Ils s’impatientent. Ils se sentent vidés, privés d’âme, anémiés. Exsangues. Exigus ! Ils se sentent à l’étroit. L’histoire dans laquelle ils évoluent leur pèse, les oppresse. Il vivent leur condition comme un carcan. Une mue, de toute évidence, est à l’ordre du jour, se profile. Le texte a changé. Le texte change, inéluctablement. Il grandit, il mûrit. Il prend forme. Il se métamorphose. L’histoire est en train de devenir autre chose. La question reste sans doute de savoir si c’est acceptable pour nous, si le jeu nous paraît en valoir la chandelle.

  Fluides - Partie III - Chapitre IV
