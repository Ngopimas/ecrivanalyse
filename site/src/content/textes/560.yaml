text: |-
  En revenant vers la rue des Martyrs, elle ne cesse d’y repenser. Mais quand donc et où a-t-elle déjà rencontré cette femme ! Le plus fou est que cela lui revient sans peine, très vite, à présent ; et avec quelle précision !
  C’était sur le quai de la station Réaumur-Sébastopol. Oui, bien sûr ! Elle s’en souvient si bien ! Il faut dire aussi que l’impression avait déjà été très forte. Dès ce jour-là et du premier coup d’œil, Élisabeth n’avait pas pu la considérer comme une passante ordinaire ; encore moins une <i>usagère</i> du métro. Oh, oui, Élisabeth se rappelle parfaitement bien son sentiment d’alors, maintenant qu’elle a dépassé <i>Le moulin de la galette</i>, après avoir coupé la rue Lepic : elle avait pensé à une <i>errante</i>, précisément !...
  C’était en hiver. La mystérieuse portait une veste courte à col en fausse fourrure - fausse, était-ce si sûr  ?... - sur un tailleur d’une assez belle tenue, malgré les quelques froissements de la jupe ici et là. Élisabeth avait déjà remarqué ces fascinants escarpins (par association, elle pouvait en effet bien se dire présentement qu’elle avait eu le temps, tout à l’heure, de noter qu’elle les portait encore), d’une bonne qualité, de toute évidence, mais déformés par un pied lui-même usé et des marches <i>sans relève</i>.
  L’avait captivée ce mélange impossible entre la distinction, un certain apprêt, de la toilette, un goût naturel pour une idée assez classique de la féminité... et une paradoxale déchéance !... Ou pas encore cela non plus : comme une autre <i>force</i> (c’est de là qu’émanait le paradoxe)...
  Des gerçures aux lèvres renforçaient, cette première fois, les rides du visage buriné. De même, les deux disques de pâleur qui décoloraient les orbites au beau milieu de ce masque rougi par l’épreuve des changements brutaux et extrêmes, en cette saison, entre la froidure du dehors et une chaleur étouffante comme celle des dédales souterrains du métro, accentuaient encore le vide de son regard. Mais non, à bien y réfléchir, ce n’était pas du vide ! C’était quelque part... Mais <i>quelque part</i> si loin ! Bien plus loin que le vide !
  Il y avait encore - surtout - cette chevelure impressionnante, comme indomptable ! Une de ces tignasses ! Véritable crinière ! De fait, réellement fauve, à bien y regarder, par son mélange animal de châtains variés et de gris. D’une épaisseur ! À l’œil nu, à ce point rêche et dure !
  Élisabeth se souvient - comme les choses lui reviennent ! - qu’elle s’était déjà imaginé toute une histoire au sujet de la vieille ; de la vieille-jeune ; de la jeune-vieille. Elle ne pouvait d’ailleurs pas s’en empêcher : il fallait toujours qu’elle invente sur le champ sa vie au moindre passant qui l’intriguait.
  Cette fois, elle avait pensé à une femme qui aurait tout perdu. Cela aurait expliqué son air un peu hébété. Une veuve ? Une ancienne femme d’affaires ? Avocate ? Fallait-il lui donner cinquante ans ? Soixante ? Soixante-dix  ? La station Réaumur-Sébastopol se trouvant près de la rue Saint-Denis, elle avait même pensé à une ancienne prostituée qui n’aurait pu se passer de revenir près de son ancien lieu de travail...
  Comme Paris peut être étonnant. C’est la mégalopole par excellence. L’on peut s’y cacher, s’y perdre, y mourir, rien que du fait de la foule.
  Et là, elle retrouve cette femme. Pourquoi ? Élisabeth avait du mal à se satisfaire du hasard. Il lui fallait toujours chercher, sinon trouver, une explication aux coïncidences ; ces <i>coins-si-denses</i>, comme elles les appelaient encore : ces lieux de retrouvailles des êtres au pays de l’improbable.
  Elle aurait voulu lui parler (Élisabeth va facilement vers les gens). Ah, si seulement elle n’avait pas été pressée à ce point !
  Mais le pays de l’improbable est parfois bien plus grand encore que l’on ne le soupçonne. Après tout, c’est aussi parce que, cette fois, elle n’avait pas pris le temps de parler à quelqu’un, c’est bien parce qu’elle avait ainsi pris le risque de la perdre cette fois-ci tout à fait, qu’Élisabeth était arrivée tout juste à temps pour décrocher son nouvel appartement, au 95 de la rue des Martyrs.
  Or, c’est bien grâce à cela qu’elle aurait bientôt droit à de nouvelles retrouvailles...

  Fluides - Partie I - Chapitre IV
