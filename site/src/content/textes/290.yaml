text: |-
         « Très chère Annick,
  Vous ne me connaissez pas. J’ai lu <i>La petite fille à côté</i>. Je l’ai même relu. Je voulais vous en dire quelques mots. Essentiellement, que je m’y retrouve.
  Bien sûr, ce texte ne raconte pas mon histoire - au demeurant, raconte-t-il bien la vôtre ? -, mais ce que j’aime justement aussi en lui, c’est qu’il aurait tout aussi bien pu, je crois, le faire. Ce n’est pas tant parce qu’il pourrait raconter mon histoire qu’il m’intéresse, mais parce qu’il en raconte l’âme, et que, ainsi, il me fait vibrer : tout comme son âme, au violon, lui donne toute son unité. Votre histoire, par ce texte, c’est encore, si vous voulez, comme la <i>clef de voûte</i> de la mienne.
  J’appellerais cela, si vous me le permettez : <i>la proximité géographique de l’inaccessible</i>. Si je puis encore vous le préciser autrement, dans ma vie, c’est parce qu’il y a cela qu’à chaque étape, je tiens le coup. Il m’importe - tout comme à vous, ai-je eu l’impression, par la lecture de votre <i>Petite fille</i> - que soient toujours réunies de cette façon, dans mon quotidien (et son extraordinaire !), les composantes du miracle.
  Oui, Annick, moi aussi, je tenais à vous le dire, j’ai besoin d’insuffisance. Je ne veux plus autre chose ; plus que les douze coups de baguette magique de midi à quatorze heures. Je ne veux plus camoufler seulement ma dignité.
  Quelque chose dans votre <i>Petite fille</i> n’est pas fini : merci ! je suis encore vivant !
             Liseur Iota... <i>redevenu un poussin</i> »
