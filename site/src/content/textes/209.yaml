text: |-
  Je vais vous parler encore de cette phratrie. Je vais vous en mieux parler. Jacques, Lucie et Georges : des enfants de la Guerre ; chacun, d’une façon où d’une autre ; marqués par elle ; la mondiale ; la Seconde !
  Anne les regarde. Elle se trouve quelque part, et elle regarde ses enfants, elle les surveille. On pourrait presque croire qu’ils l’agacent... parce qu’elle doit les surveiller ? Tout cela s’est fait si vite ! trop vite ! La <i>Blitz-Mutterschaft</i> !...
  Voici l’histoire : c’est une famille de la Corrèze. Les Naoul. François Naoul a épousé Anne Bador. Celle-ci est née en 1918, le 13 décembre. Elle a 22 ans en 1940, donc. Certes, elle est née en 1918, mais cela a-t-il vraiment de l’importance ? Il faut le croire, puisque, aussi bien, je vous le précise. François, lui, est né le 17 avril 1914, à Meyrignac-l’Église. Tous deux sont nés à Meyrignac-l’Église. À Meyrignac-l’Église, on les appelait les <i>guerrieux</i>, les <i>belligérants</i>, 14-18, etc.
  Leur premier fils, Jacques, naît le 29 décembre 1940. Lucie, elle, le 12 décembre 1941. Anne avait perdu la boussole du retour de couche ! Enfin, le 16 juin 1946, voici Georges : le seul véritable enfant de la... <i>libération</i>.
  Toute la vie de leur union, Anne n’a pas laissé de reprocher à François de n’avoir pas fait attention, de n’avoir jamais su le faire. Dans ce domaine-là comme en tout, d’ailleurs  ! Non mais ! a-t-on idée de faire - et, à plus forte raison, de refaire - un enfant à sa femme pendant la guerre !...
