text: |-
  Quel est le lien entre tout cela ? Comment tout cela s’accorde-t-il ? Qu’a donc à voir la persécution d’une toute nouvelle collégienne par ses « camarades » avec une éventuelle rupture d’anévrisme ? Le nom de la rue des Martyrs est-il anecdotique ou bien signifiant ? Et le vagabondage, quelle place a-t-il, dans cette histoire ? Au demeurant, n’est-il pas antinomique de parler de <i>place</i> d’un quelconque <i>vagabondage</i>... même dans une histoire ? Je suis pourtant sûr qu’il y a un lien entre tout ça. J’en suis certain !
  Mais quelle histoire, me direz-vous ? Eh bien, celle de cette équipe, de ce groupe, de cette <i>Brigade</i> étrange ; celle de ce quartier ; celle de cette entrée en scène du drame, depuis l’accident cérébral du Jumeau d’Élisabeth. Et d’ailleurs, justement : pourquoi tous ces jumeaux ? Est-ce là le lien ? Après tout, n’avons-nous pas appris que Lydie elle-même avait un frère jumeau ?
  J’irai même plus loin. Quel est donc cette histoire qui n’a pas de nom, comme un livre qui n’aurait pas de titre ? Quel est le nom de cette histoire ? Voilà le lien ! J’en suis absolument persuadé à présent ! C’est le nom qu’il faut chercher ! Le titre ! Je suis sûr que tout est là ! Un mot, peut-être ? Une phrase ? Un indice ? Un signe ?...
  Je sens que nous nous rapprochons... <i>D’ici</i>, j’ai l’impression que ce nom est plutôt un mot, un seul mot. Il est simple. Mais je crois bien qu’il est magique aussi. Oui, c’est cela, il est magique ! C’est d’ailleurs peut-être le mot <i>Magie</i>. Mais enfin, ne nous précipitons pas, je n’en suis pas encore sûr. Je pensais au mot <i>Style</i> aussi. Mais, non. Là, je suis sûr que ce n’est pas cela.
  Peut-être... Voilà ! Peut-être <i>Fluide</i> ! Ou alors <i>Fluides</i>, peut-être bien. Mais oui ! C’est très possible, dites-moi  ! Plus j’y pense et plus j’ai le sentiment qu’il s’agit bien de cela. Le lien ! <i>Fluides</i> ! Ce serait ce mot-là. Au pluriel ! Mais oui ! Bien sûr !
  Ou alors !... <i>Pluriel singulier</i> !... Oh, oui ! Ou <i>Singulier pluriel</i> !... Je ne sais pas trop. Mais je sens que nous approchons du lien. Peut-être allons-nous finir par l’appréhender.
  Et si... Et si <i>Singulier pluriel</i> était un sous-titre. Car, plus j’y pense et plus il me semble bien que le lien, le lien lui-même, entre tout ça, c’est bien <i>Fluides</i> finalement. Mais là, tout à coup, je pense à autre chose : et si c’était l’inverse ! Et si c’était <i>Fluides</i> le sous-titre et <i>Singulier pluriel</i> le « vrai » titre. D’ailleurs, <i>Singulier pluriel</i> ou <i>Pluriel singulier</i>, vous comprenez, comme cela tourne ? Vous avez vu, vous aussi : cela n’arrête pas de tourner ! De véritables volutes !
  Une chose est sûre : nous nous sommes approchés. Nous avons enfin un début d’explication sur ce qui relie tout cela : Élisabeth, la <i>Brigade symbolique</i>, le <i>bas-lanceur</i>, la vieille, les jumeaux, la rupture d’anévrisme... Nous avons enfin un début d’explication sur ce... <i>début</i>. Ce début est le début d’une histoire. Et cette histoire a pour titre : <i>Fluides</i> ou <i>Le singulier pluriel</i>.

  Fluides - Partie I - Chapitre XXI
