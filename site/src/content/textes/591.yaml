text: |-
  « Non non, Élie ! je me répète, c’est possible, mais je ne vois pas trop pourquoi nous nous sommes embarqués si vite avec cette Élisabeth ; ou alors, je crois qu’il faudrait que tu me fasses une piqûre de rappel.
  - Je peux t’aider, je pense, Michel. En plus, tu sais, j’ai pu m’entretenir une nouvelle fois avec elle. Vas-y, dis-moi, qu’est-ce qui ne te paraît pas clair ?
  - À vrai dire, un peu tout, Élie. Moi, tu me connais, je ne suis pas contrariant, mais j’avoue que je me demande vraiment ce qui a pu décider l’<i>Amirale</i> à nous engager tous dans cette histoire.
  - Tu as bien compris qu’Élisabeth se sent responsable de l’AVC de son frangin tout de même ?
  - Mais enfin, Élie, et quand bien même ! Ce ne serait pas la première fois que ça arrive ! Je ne vois vraiment pas là de quoi ouvrir une enquête !
  - Tu sais bien que c’est plus complexe que ça. Je vais t’expliquer : rappelle-toi, Élisabeth croit dur comme fer en une sorte de monde parallèle. Tu te souviens, elle l’appelle le théâtre des <i>coins-si-denses</i>  ! Pour elle, chacun de nos actes a des conséquences à la fois visibles, certes, mais aussi invisibles. Selon sa conviction, c’est dans ce dernier registre qu’il faut chercher le lien entre ce qu’elle considère comme sa <i>faute</i> et le coma de Raymond.
  - Sa <i>faute</i> ?...
  - Oui, tout d’abord, rappelle-toi, le jour de l’AVC, elle avait initialement prévu d’aller acheter le cadeau de Noël de son jumeau à la FNAC de Saint-Lazare.
  - Oui, c’est vrai. Et alors ?
  - Alors, tu sais que c’est ce jour-là qu’elle a suivi le <i>bas-lanceur</i>. Pour elle, c’est là qu’il faut chercher, dans ce changement de cap, le commencement de sa <i>déroute</i>.
  - Elle est un peu bizarre quand même, la fille, tu trouves pas ?
  - Ah, voilà notre cartésien de service qui reprend du poil de la bête ! Qui sait, peut-être, Michel. Nous verrons. Ce qui reste cependant troublant, c’est qu’elle apporte d’autres éléments étonnants dans son témoignage, et même si celui-ci revêt assurément quelque chose de <i>pré-interprété</i>. Il y a eu tous ces gestes du <i>bas-lanceur</i>, souviens-toi : il a mimé un dormeur, or, le soir même, Raymond a fait son accident cérébral en plein sommeil ; il a également imité une explosion, que l’on peut assez facilement, avec Élisabeth, associer avec l’éclatement d’un vaisseau sanguin ; de même, lui a-t-il ostensiblement désigné la station Saint-Lazare sur le plan de la ligne de métro qui se trouvait au-dessus des portes par lesquelles il s’est échappé ! Pourquoi précisément Saint-Lazare... où elle devait se rendre ?! Je t’accorde, Michel, que tous ces éléments ne sont pas suffisants pour prouver à coup sûr le bien fondé des déductions de notre nouvelle protégée, mais tu sais aussi que notre <i>Brigade</i> existe par ailleurs parce que nous avons tous choisi de ne pas exclure du champ envisageable de <i>nos “justifications” de la vie</i> de pareilles hypothèses... »
