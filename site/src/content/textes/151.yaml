text: |-
  Maintenant, peindre l’<i>être ange couleur</i> !
  L’inconsolable incâlinée et prénommée inconciliable !
  Non d’une reconnaissance : son nom !
  Non d’une grand-mère : sa Croix !
  Annick ! Sainte ! couche-toi là !
  Fille unique à l’unique frère !
  Honteuse du plaisir du devoir !
  Celle qui ne s’enlaçait pas !
  Si captivée par sa prison !
  S’enlaçait pas de ce <i>deux-voir</i> !
  Lui était pourtant si attachée !
  L’a condamnée en la quittant !
  Double accouchée mélancolique ! en découchant !
