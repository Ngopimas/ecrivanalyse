text: |-
  CEUX QUI FÂCHENT LE SUJET.- Annick Lebédyk, bonjour ! et merci encore d’avoir accepté de répondre aux questions de <i>Ceux qui fâchent le sujet</i>. Notre revue se réjouit spécialement, eu égard à sa tradition subversive et impertinente, de vous recevoir aujourd’hui alors que, reconnaissez-le, cette fameuse exposition de vos œuvres réalisées en illustration du texte de votre écrivanalyse, éponymement intitulée <i>La petite fille à côté</i> et initialement annoncée au fur et à mesure de la rédaction dudit texte, commence à se faire tout de même étonnamment attendre, ne croyez-vous pas ?
  ANNICK LEBEDYK.- C’est toute la différence entre <i>l’initiale</i> et <i>la dernière lettre</i>... et peut-être aussi, du moins je l’espère, toute la cohérence de mon engagement dans l’expérience écrivanalytique qui m’a été proposée : je savais ce que j’acceptais en l’entreprenant, mais, justement, y compris sa dimension évolutive ; du coup, j’envisageais de pouvoir découvrir, aussi bien durant l’expérience qu’à son terme, autre chose que ce que j’avais prévu.
  CQFLS.- Charabia un peu, tout ça, ne trouvez-vous pas ? Ne s’agirait-il finalement pas, pour vous, de tenter de masquer derrière un tel écran de fumée rien moins qu’un fiasco ?
  A.L.- Je ne crois pas. À ce stade où les créations de <i>La petite fille à côté</i> ne sont pas encore exposables, l’expérience a déjà été très bénéfique pour moi. En effet, durant toute cette année où s’est élaboré le texte, et qui a par ailleurs vu, dans ma vie, tant de bouleversements (installation irréfutable dans la retraite, déménagements, tentative de vie en yourte, réapparition de fantômes du passé, bref, pertes multiples de repères...), la régularité de la démarche a constitué pour moi un cadre particulièrement rassurant.
  CQFLS.- Bref - comme vous dites... -, la question demeure : où en sont lesdites illustrations ? existent-elles, au moins ?!
  A.L.- Elles existent forcément, puisque, en commun avec mon écrivanalyste, nous les avons inventées ; ou, tout du moins, tant vous avez l’air et l’art de chercher la petite bête...
  CQFLS.- La petite <i>Bébête</i> ?!
  A.L.- ... Tout juste, si vous y tenez... et me permettez néanmoins de terminer : elles existent, ces illustrations, puisque nous avons <i>commencé</i> à les inventer.
  CQFLS.- Des mots encore que tout cela ! Mais, la matière ? Où en êtes-vous de la réalisation, au-delà de la conception ? Tenez, soyons précis, quelle(s) technique(s) allez-vous - ou avez-vous, si vous préférez - utiliser ?
  A.L.- Comme d’habitude, une large palette : techniques mixtes, papiers collés, froissés, déchirés, etc. Je peux même vous détailler les formats : divers !
  CQFLS.- <i>D’hiver</i> ?
  A.L.- Si cela encore vous amuse, soit, aussi, mais alors dans le style <i>Renaissance</i> !
  CQFLS.- Bref, tout cela s’essouffle, non ?
  A.L.- Là encore, je vous laisse juge. N’avez-vous pas vous-même fait allusion aux saisons. Vous n’ignorez pas qu’elles reviennent. Je parlerais plutôt d’une étape, d’une transition.
  CQFLS.- Quoi, un scoop ?! Arrêteriez-vous l’écrivanalyse ?!
  A.L.- Bien au contraire : à l’issue des vingt-cinq premiers chapitres, à cette occasion de l’achèvement de ce qui se révèle en être la première partie, cette expérience va connaître une suspension qui en annonce aussi, dans le même temps, la poursuite ultérieure dans l’entreprise d’un deuxième mouvement.
  CQFLS.- Nous apprêtions-nous à tuer la poule dans l’œuf ?
  A.L.- Je constate que vous semblez m’écouter plus attentivement.
  CQFLS.- Aussi bien ne cherchions-nous surtout qu’à vous faire réagir à chaud.
  A.L.- J’ai du mal, comme vous avez pu le remarquer. Pour votre scoop, il se pourrait très bien que cette difficulté constitue un des axes importants du travail de la prochaine phase de mon écrivanalyse.
  CQFLS.- La prochaine tranche ?
  A.L.- De vie en tout cas.
  CQFLS.- Vous ne souhaitez visiblement plus seulement vous construire en négatif ?
  A.L.- De fait. Je tente dans cette histoire comme une inscription dans un <i>cadre de l’autre</i> qui me permette de sortir du carcan qu’avait fini par constituer le mien.
  CQFLS.- Une réappropriation de votre être face au déterminisme de votre hasard ?
  A.L.- Contre la colère froide des dès, dirais-je plutôt, mais oui.
  CQFLS.- Nous vous remercions encore, Annick Lebédyk, d’avoir bien voulu accorder cette entrevue à <i>Ceux qui fâchent le sujet</i>, et en espérant que vous ne tiendrez finalement pas trop rigueur à notre revue de son esprit chicaneur.
  A.L.- En rien. N’avons-nous pas su, après et malgré tout, en rester au cordial. Mon écrivanalyste vous aurait dit alors - sans que je sache trop pourquoi, d’ailleurs, mais non plus que je doute que ç’aurait été ici à-propos - que <i>ne se disputent que veules</i>.
