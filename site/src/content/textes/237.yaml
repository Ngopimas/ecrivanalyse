text: |-
  Un conte à faire dormir. Faire dormir les petites filles. D’Annick et son petit chien. Celui qu’elle n’a jamais eu. Qu’elle a toujours voulu avoir. Pour lui donner un nom. Elle savait déjà comment l’appeler. Elle l’appelerait Rien, son chien. Elle savait tout sur lui. Il serait noir ou blanc. Un mâle ou une femelle. Racé méchant ou gentille bâtarde. Du cabot guerre ou paix. Guère épais ou bien mince. Mince, réel ou bien illusoire. Allusif ou franc, il serait. Injustement indulgent ou son contraire. Lécherait la main de Jean. Son papa pas vraiment pépère. Lui répondrait à son appel. Mordrait son reproducteur, son pedigree. Saurait grogner sur sa mémère. À lui <i>réperdre</i> la tête. De son regard froid sec. Mais fille d’elle à maman. Dévouée à cette copine presque-jumelle. Ensemble, ni victime ni bourrelle. Et ce faisant : la faite. Pas comme elle comme une. Canine des semaines de dimanches. Elle connaîtrait son nom changeant. Le subterfuge de sa dénomination. Son nom rose ou bleu. Son nom, à son toutou. Son toutou Rien, à Annick.
