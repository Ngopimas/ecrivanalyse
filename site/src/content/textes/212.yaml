text: |-
  Lucie aime rêver. Elle a toujours aimé rêver. Enfin, toujours... Cela, ce goût pour la rêverie, quoi qu’il en soit, quelle que soit la façon de laquelle il faille préciser ce « toujours », lui vient assurément de Mémé Béatrice ; sa fausse grand-mère, comme elle le dit encore parfois.
  <i>Préférer rêver sa vie plutôt que de la vivre</i>, est-ce que cela aussi viendrait de Mémé Béatrice ? Lucie adorait se réfugier dans la chambre de cette dernière lorsqu’elle était petite ; de fait, il serait sans doute plus juste de dire qu’elle adorait se réfugier dans <i>le monde de sa chambre</i> : celui-ci lui paraissait si vaste, à ce point <i>tellement plus infini</i> que le monde réel lui-même ! Il y avait toutes ces photos, tous ces objets ; ces traces d’un passé pour la petite Lucie déjà totalement enfoui dans les abîmes du temps. C’est que Mémé Béatrice avait vécu, pendant toute une période de sa vie, en Indochine - Eh oui, Monsieur ! - et qu’elle en avait ramené des trésors inépuisables de couleurs, de parfums, de formes !... Lucie percevait bien qu’elle, au moins, la comprenait. Mémé Béatrice n’ajoutait-elle d’ailleurs pas spontanément, à toutes ces merveilles, le rehaussement idéal de sa propre imagination, quand elle s’appliquait à lui conter, puis, partant, lui ressasser à volonté tout le récit de son séjour asiatique, et en puisant pour cela à la moindre demande de l’enfant dans le réservoir intarissable des variantes de son souvenir ?
  Du reste, la mère de Lucie, Françoise, craignait qu’à terme, la petite ne sache plus bien, à cause de toutes ces « fabulations », faire la distinction entre le rêve et la réalité... Il faut dire aussi, à sa décharge, que celle-là avait été, de son côté, bien cruellement marquée, dès sa plus tendre enfance, du sceau impitoyable de la réalité... Oui, peut-être cette adulte précoce par obligation enviait-elle surtout au fond sa fille de pouvoir vivre grâce à sa grand-mère de substitution ce dont la mort soudaine de son père, alors qu’elle n’avait encore que trois ans, l’avait privé pour tout le reste de son existence. Depuis ce jour funeste, en effet, un sentiment lui était devenu définitivement inaccessible : l’espoir...
