text: |-
  La plaque du fameux 95 se trouve à droite de la porte d’entrée de l’immeuble. Quelques marches - une ou deux... deux, donc ! - dénivellent son accès de la surface polie des pavés du trottoir. Je sais aussi qu’Élisabeth vient de rentrer de son périple, son aventure ! dans le métro. Elle a dû se plier à un petit interrogatoire auquel l’ont soumise les policiers du centre de surveillance multi-gare de Saint-Lazare. Elle a tout dit, le plus objectivement possible. Elle est encore un peu sous le choc. Elle réalise seulement qu’elle n’a même pas encore allumé chez elle... Certes, Élisabeth préfère quand la lumière n’est pas trop agressive... Mais là, vraiment, ce sombre !... Cela dit, elle raffole aussi infiniment de la lumière du soleil... À tel point, d’ailleurs, qu’alors, pour le coup, il peut tout aussi bien s’agir d’<i>éblouissance</i> !...
  En fait, elle n’a que <i>presque</i> tout raconté aux policiers... Cela a été plus fort qu’elle... Il faut toujours qu’elle aille <i>plus loin</i>... Ce bout de papier... Vieux... Froissé... Presque entièrement brûlé... Elle n’en a rien dit... Elle l’a ramené chez elle... Personne ne l’a vue... Elle n’a pas pu résister lorsqu’elle l’a aperçu sur la banquette encore fumante... (ou alors, personne ne l’a dit ; ne l’a dénoncée...)... Elle n’en revient pas !... Il n’y a plus que deux choses qui soient encore lisibles sur cette feuille... Ce document... Son titre : c’est un acte de naissance... Et une date... 1936... Élisabeth est captivée, fascinée par ces deux éléments... Tout le reste a brûlé...
  Elle alla fermer ses volets... Sur son balcon (il fait tout le long de son appartement sur la rue), elle ramasse un peu de linge qu’elle avait laissé séché en partant... ce matin... C’est un des nombreux avantages de son appartement... Certes, ses linges sont presque gelés, mais, malgré le froid, ils sont aussi presque déjà secs. Il est vrai que c’était du petit linge... L’appartement... tel qu’il est orienté... il suffit, ainsi, qu’il y ait une belle journée ensoleillée... même en hiver... pour qu’un peu de petit linge puisse sécher ; sur son balcon... à Élisabeth... voilà... c’est tout !...
  Son mobilier est assez sobre... Il y a peu de chose... De toute évidence, elle préfère la qualité à la quantité... L’appartement est clair... De couleur... Mais pas trop vif... Essentiellement du blanc... Des beiges... quelques ocres... Juste une touche de rouge dans la cuisine... Un petit reste des précédents occupants... Elle verra plus tard, si elle revient sur ce rouge... Il y a un très ancien, et typique, et minuscule ascenseur qui se glisse entre les marches et les paliers, dans la cage d’escalier, au 95... Élisabeth a besoin de se calmer... Elle s’est affalée dans son canapé club... C’est un de ces rares éléments du mobilier (dont je parlais)... rares, mais, de toute évidence, <i>recherchés</i>...
  Le chat !!... Voilà !... Ah !... Je vous le raconte enfin !... Le chat d’Élisabeth !... C’est son remède !... Calmant !... Sa <i>flash-thérapie</i>  !... Gros coup de stress ? câlin minou !!... De fait, on fait plus récalcitrant comme médoc, plus dur à prendre !... Celui-là, c’est plutôt tout facile pour l’ingurgite !... Du petit lait, le ronron !... Et que je te saute immediately sur le giron !... Que je patouille !... Et je me frotte !... On a du coup là tout de suite Élisabeth en phase d’évolution : ça se détend partout très vite !... À mesure que la Poupoune se chauffe en symphonie de pull-over majeur !... C’est une chatte, la demoiselle !... Eh oui, messieurs !... Et pas seulement parce qu’on lui a coupé la queue !... Son genre, c’est d’origine ; mais pour le reste, si vous saviez !... L’une des plus pires frayeurs de sa maman entricotée !... Vous vous situez ?... La chapardeuse de pièce à conviction en souterrain !... Élisabeth y pense encore !... Malgré son début d’apaisement du soir !... Maintenant ! juste en repassant la main dessus !... La grâce infirme de sa Poupoune !... L’horreur en fait !... Elle en pleure à chaque fois du ressouvenir !... C’était dans le garage, dans son ancien pavillon, en banlieue... Elle n’avait pas vue que minoute se siestait tout près d’une des roues arrières... Sort la voiture !... Elle a aussi été toujours si brusque sur un volant !!... Surtout jusqu’au garage de ce jour-là... Et comme ça crie ! ça hurle ! déchire !! si vous saviez, dans ce cas, un bestiau quand ça souffre !... Alors, si c’est <i>par-de-plus</i> notre faute !... Imaginez ?!... Elle s’en voudra toujours, Élisabeth... Plus que quatre petits centimètres qui nous lui restent, à la Poupoune... De pas écrabouillés...

  Fluides - Partie I - Chapitre XIII
