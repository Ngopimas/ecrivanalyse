text: |-
  <i>André Pascal souhaita la bonne année à ses étudiants. Il leur dit qu’il espérait que leurs vacances de noël s’étaient bien passées. Puis, avant de reprendre le cours du cours, il tint encore à faire un point de rentrée sur le fameux seul dossier à rendre pour toute l’année au titre de l’évaluation...</i>
  ... Ce début de nouvelle année ne verrait pas disparaître son inimitable rythme d’élocution ; il entrecoupait toujours autant son propos d’une infinité de suspensions dont chacune avait cette caractéristique qu’elle vous donnait le sentiment de pouvoir tout aussi bien s’achever sur un silence définitif et devenir, de ce fait, la dernière. Dans les amphis, on le surnommait <i>La hache de guerre</i> ou encore <i>Dédé La Hache</i> :
  - À vrai dire... Vous allez essuyer les plâtres... De fait, je vous avais prévenu... Ce texte... Je veux dire... Vous savez ?... Ce que je vous ai donné à lire avant les vacances... Notre travail... Le dossier... Soyons clairs !... C’est la première fois que je donne ça !... J’expérimente !... N’est-ce pas ?...
  Les sourires s’allumèrent dans la salle. Pascal n’avait pas non plus perdu son charisme légendaire. Ses collègues le lui enviaient unanimement. Il vous captivait un auditoire en quelques secondes. C’était quasi magnétique !
  - Avez-vous lu, seulement !... Entre sapins et chocolats !... Joujoux, familles... Avec un x, je vous rappelle !... Arrêtez d’orthographier comme des cochons !... Hein, les joujoux, avec un x !... Bon... Où j’en étais, moi ?...
  - Au texte, Monsieur !
  - Ah oui ! Le texte...

  Fluides - Partie II - Chapitre I
