id: 1398
title: "Vue de qui se passe"
soustitre: "Ouverture de sa fermeture traversière"
lines:
  - "Sans se casser les pieds,"
  - "de la flûte aux chevilles,"
  - "au chaud de ses trémolos,"
  - "être témoin de son public :"
  - "se titiller de son imagination."
