id: 544
title: "La demande latente de l’attente"
soustitre: ""
lines:
  - "Se sauter à la figure,"
  - "mâle veillant à faire bien,"
  - "injuste de ne plus s’aimer,"
  - "de ne pouvoir s’en contempler,"
  - "ni s’y voir en pâture."
