id: 285
title: "Se souvenir juste une vie"
soustitre: ""
lines:
  - "Le devoir de travailler ensemble"
  - "se flatte d’être choisi, promet"
  - "- malgré sa peur d’être excitoire -"
  - "l’honnête remerciement d’une intrigante représentation :"
  - "on y pense le soir."
