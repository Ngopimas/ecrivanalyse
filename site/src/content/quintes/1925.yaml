id: 1925
title: "Ce qu’il y a aussi"
soustitre: "Couvé s’étant donné à réfléchir"
lines:
  - "Noble de sa part noble,"
  - "s’y prendre mâle en mal :"
  - "ce pour quoi l’on s’engage,"
  - "ceux pour qui l’on s’éveille,"
  - "le dégourdir en sa méthode."
