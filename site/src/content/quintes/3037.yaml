title: "Ce qui ne sait vu"
soustitre: "Expié tendant à l’idéal prosaïque"
lines:
  - "À l’intersection du largement réciproquement,"
  - "se rendre service d’une malléabilité,"
  - "à la découverte de l’infâcheux,"
  - "unis vers un nôtre univers."
  - "À l’allure de son pas…"
