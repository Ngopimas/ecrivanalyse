title: "Ce qui ne se voit"
soustitre: "Clinique arrogante du non conventionnel"
lines:
  - "Entre une paire de scandale,"
  - "se martyrise l’abyssal colossal, d’un"
  - "culotté d’énigme, s’incurve l’encorvée parmi"
  - "l’abandon : s’engouffre rigidité de ce"
  - "qui se tient à dire."
