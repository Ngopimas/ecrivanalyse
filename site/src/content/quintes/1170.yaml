title: "Le nom de sa tête"
soustitre: "Plume du serpent à boucles"
lines:
  - "À proprement parler du sale,"
  - "être initiée à l’anodin singulier,"
  - "capuche où cauchemarder en bleu,"
  - "rembarde où s’adonner à l’inabandon,"
  - "procréastination où reprendre son soufre."
