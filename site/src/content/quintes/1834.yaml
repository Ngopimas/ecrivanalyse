title: "Façon de voir sa vie"
soustitre: "Arabe génératif en trois dimensions"
lines:
  - "Leurre en clé de son,"
  - "ami à mi-chemin du là,"
  - "ce disant à l’heure actuelle,"
  - "un peu une porte peu-importe…"
  - "être humain référencé en nostalgie."
