id: 3110
title: "Ce qu’on a de plus"
soustitre: "Précieux comme de son temps"
lines:
  - "Œcuménique en végane aux éleveurs,"
  - "se faire place en thérapeute,"
  - "en une réserve de ouï,"
  - "avec le sac à dos…"
  - "de son jour le jour."
