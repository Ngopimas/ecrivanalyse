title: "Le troc de la coïncidence"
soustitre: ""
lines:
  - "Aimer son groupe de quelqu’une ;"
  - "à son seuil de lisibilité,"
  - "la procéder du bon échange ;"
  - "à son escabeau à croche-pied,"
  - "pouvoir se joindre à elle."
