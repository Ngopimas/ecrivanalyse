id: 1613
title: "Si ça avait été soi"
soustitre: "Donné basé sur sa génération"
lines:
  - "De l’abus à la bulle,"
  - "ça s’image à la lettre :"
  - "ce qui aura été, l’aura…"
  - "Y est capturée la mouvance"
  - "en double du partage accrédité."
