title: "Avoir la tête à ça"
soustitre: "Emplette de son style personnel"
lines:
  - "Être chez soi avec l’autre,"
  - "ne pas vraiment se tromper"
  - "– prendre ce qu’on se propose,"
  - "ayant besoin d’un axe idyllique…"
  - "n’être pas interdite d’être sentimentale."
