id: 681
title: "La moitié de sa mesure"
soustitre: "Bras tendu par un alcoolisé"
lines:
  - "Partant à l’étranger psytinérant, voir"
  - "ce que panse le monde,"
  - "ou encore faire ses polygammes,"
  - "se soustraire de ne s’apprécier,"
  - "et à son regard démoralisateur."
