title: "Où le cœur y est"
soustitre: "Inaugurée en machine à imaginer"
lines:
  - "Tombée là où l’on naît,"
  - "ayant oublié de se fermer –"
  - "s’œuvrant à n’être pas sevrante !"
  - "se regarder s’entendant en cacophonie"
  - "et sécurisante… en présence d’escrocs-terrestres."
