title: "À le faire à part"
soustitre: "Désespérant se limitant la trace"
lines:
  - "À mi-mots cités parmi l’animosité,"
  - "avec disparition pour ses yeux,"
  - "ne supportant pas sa peine,"
  - "être utile à son travail…"
  - "à éviter de le rater."
