id: 1918
title: "Ce que ça se rapporte"
soustitre: "Mince confortable à l’asymétrie bleue"
lines:
  - "Pour être quelqu’un d’autre temporairement,"
  - "suffisamment ouvert pour s’en protéger,"
  - "n’en rester pas moins tachycardique"
