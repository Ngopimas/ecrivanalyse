id: 426
title: "Un bon heurt de soi"
soustitre: ""
lines:
  - "Chemises où les bûches ronronnent,"
  - "poitrines croquises, mutites pas très"
  - "séreuses par le volet percé :"
  - "croire qu’on n’est pas heureux,"
  - "ce n’est pas vraiment étrange."
