id: 1182
title: "Ce que ç’aurait pu être"
soustitre: "Plant bé pour son héritage"
lines:
  - "À côté d’un fossé creusé,"
  - "avoir son idéal devant soi,"
  - "allant à l’en-dehors du corps,"
  - "à s’en délimiter à l’imagination."
  - "Savoir cultiver son chagrin secret…"
