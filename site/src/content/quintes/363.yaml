id: 363
title: "À l’intention de la présence"
soustitre: "Peste aux pâtes en échec"
lines:
  - "D’une intimité étrangère à toi-même"
  - "aux rencontres d’émois, tu représenteras"
  - "finement, souplesse articulée, silhouetteras la"
  - "complice nouveauté, l’innocent moule d’une"
  - "lutte pour ta voisine sérénité."
