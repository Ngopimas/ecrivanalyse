title: "Ces gens qui sont là"
soustitre: ""
lines:
  - "L’amitié se rapproche quand on"
  - "y voyage, s’y intéresse, s’y"
  - "arrête, y regarde doublement, la"
  - "prévient, l’agit, contribue l’enrichir, y"
  - "pense, lui intime sa parole."
