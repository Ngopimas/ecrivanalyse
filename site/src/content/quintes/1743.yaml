title: "Ce qui se fait confiance"
soustitre: "Heuré en puzzle de joconde"
lines:
  - "Friand de se sentir cultivé,"
  - "s’autoriser à ne pas s’obliger,"
  - "pouvoir aussi bien se mentir !"
  - "unique comme tout le monde,"
  - "à l’accolade de la persévérance."
