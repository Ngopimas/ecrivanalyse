id: 635
title: "Bon jour pour le dire"
soustitre: ""
lines:
  - "L’envie qu’on se laisse vivre"
  - "de se demander l’avis, fâcher,"
  - "faire les magasins de preuves,"
  - "de gaminer l’insignifiance, ne se"
  - "mérite qu’en vacance de retraite."
