title: "Être au fond de soi"
soustitre: "Boule de joie à protéger"
lines:
  - "S’aimant se dire qu’on sème,"
  - "en sa solution assez rapide !"
  - "s’extasier à s’y voir envie :"
  - "ne cachant plus son Je ?"
  - "se retrouver à la rue."
