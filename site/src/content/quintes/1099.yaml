soustitre: "Rebord d’eau dans son vin"
lines:
  - "Monté par parti pris pro,"
  - "mon ton de maître d’école,"
  - "mon véritable compte de fait"
  - "– mon choix d’avoir tes règles –"
  - "s’estomaque que tu ne l’escamotes !"
