id: 623
title: "L’abri du regard de l’autre"
soustitre: ""
lines:
  - "Verre ou vert de cage,"
  - "se faire baliser le désir,"
  - "lâcher la proie pour l’ambre,"
  - "s’inciser dans le sens atavique :"
  - "aboutir à son rapport textuel."
