title: "Les deux en même temps"
soustitre: "Messages de répondeur et d’outre-tombe"
lines:
  - "Se présenter à sa famille,"
  - "savoir faire quoi avec qui –"
  - "en once saine des curiosités –"
  - "saurait être tout seul ensemble,"
  - "genre qu’on traiterait de connard."
