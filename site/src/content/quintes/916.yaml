title: "Mettre en œuvre le rien"
soustitre: "Préparatoire à beaucoup de grand-chose"
lines:
  - "Tenir l’autre par le coût,"
  - "jeune quand on est grande :"
  - "se passer à quelqu’un d’autre,"
  - "se piquer de gentillesse verbale,"
  - "s’aguicher à développer le pipelet !"
