title: "Ne pas se sentir plein"
soustitre: "Recette sur avances à l’humanité"
lines:
  - "Ce qui ne peut arriver,"
  - "qui traîne ce qui pousse,"
  - "qui fatigue ce qui délasse,"
  - "ignore ce qui sait, pourtant"
  - "voyage dans le même monde."
