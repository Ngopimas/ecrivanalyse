id: 3217
title: "À ce qu’on se paie"
soustitre: "À recherchante de l’Adam perdu"
lines:
  - "Compagne épouvantée sans époux vantable,"
  - "médiatrice des profondeurs de l’humain,"
  - "se désempêcher ne se dépêchant,"
  - "à rigoler de sa dégringolade,"
  - "en clé de son double."
