id: 3184
title: "À la base d’un bar"
soustitre: "Passant aperçu ne passant inaperçu"
lines:
  - "Pensée évidante remplissant de bonheur :"
  - "sexuellement désorientable par le trop,"
  - "se démarcher en démarqué absent"
  - "– ce qui se parait intéressant ?"
  - "par le solfège des efforts."
