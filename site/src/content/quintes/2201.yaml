title: "Ce qui sort de soi"
soustitre: "Réglé en apprenant ses règles"
lines:
  - "Celui qui ne s’arrête jamais,"
  - "au savoir-faire de s’avoir l’air,"
  - "au Moyen-Âge de l’âge moyen :"
  - "en proportion avec sa curiosité,"
  - "sèmera bien qui est mélodieux !"
