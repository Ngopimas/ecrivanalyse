id: 3113
title: "La vie et la sienne"
soustitre: "Branleur passé à autre chose"
lines:
  - "Consommateur de musique en évidence,"
  - "pesant de sa responsabilité scolaire,"
  - "à son retournement de différés,"
  - "sur sa prise de maturité…"
  - "être le moi de choix."
