title: "À la ligne de vie"
soustitre: "Préférée comme animale de méli-mélo"
lines:
  - "Très super en dessous malheureux,"
  - "brassée tatouâgée à la gomme,"
  - "en sœur éclairée sans pitié,"
  - "ne se prendre pour tout,"
  - "ni comme à la mère."
