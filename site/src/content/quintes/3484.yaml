title: "À dire non au nom"
soustitre: "Origologinale et les petits fantômes"
lines:
  - "À l’évacuation de sa tristesse :"
  - "voir l’ouverture qui y passe ?"
  - "aux partages qu’on en fait,"
  - "l’amour que l’on y met…"
  - "en apprenant à y lire !"
