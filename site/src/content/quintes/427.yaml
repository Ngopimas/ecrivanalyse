id: 427
title: "À la place des gens"
soustitre: ""
lines:
  - "Nulle autre part qu’à la"
  - "source des conflits, au chaînon"
  - "frappant du mot, vains, les"
  - "tristes se ravisent, ravissent qu’ils"
  - "rachètent ce qu’on en sait."
