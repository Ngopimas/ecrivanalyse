title: "Au nom du sang fin"
soustitre: ""
lines:
  - "Le dit mentionné, l’art assurance,"
  - "inempêché couragile la rendant jalouse,"
  - "à la folie du manque"
  - "dommagée de sa propre perte,"
  - "qu’elle l’appelle de ses vœux !"
