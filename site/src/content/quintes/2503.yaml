id: 2503
title: "Au ton de sa voie"
soustitre: "Embobine encadrée par son honnêteté"
lines:
  - "Plus que faire la tête,"
  - "aller s’y voir son idée :"
  - "qu’on n’a autour de soi !"
  - "au derrière de son sourire ?"
  - "se choisissant en gaie sachante."
