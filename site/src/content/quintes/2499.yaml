title: "Ce qui se fait beau"
soustitre: "Gâtée d’anniversaire en objet d’environnement"
lines:
  - "Revenant de vacances de colonie,"
  - "se prendre pour qui aimerait,"
  - "en curiosité attisée à tisser,"
  - "se voir éclore sans racket,"
  - "ce qui veut s’en sortir…"
