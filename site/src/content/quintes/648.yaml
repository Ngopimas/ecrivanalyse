id: 648
title: "Une touche à la folie"
soustitre: "Bonne mère à trois soeurs"
lines:
  - "En l’œuvrette à son avis,"
  - "vouloir en venir nulle part,"
  - "embolie de planter le travail,"
  - "ne pas vraiment tout déchirer,"
  - "en cyclique des plus hormonales."
