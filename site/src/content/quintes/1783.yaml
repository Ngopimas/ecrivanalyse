title: "Ce qui va se toucher"
soustitre: "Illustrée en son fleuve merveilleux"
lines:
  - "Délicate qui se fait drôle,"
  - "être croquée par sa bouche,"
  - "boule de n’ai-je- ? au ventre ?"
  - "avec quelqu’un d’autre avec soi,"
  - "assise sur sa sensibilité désinvolte…"
