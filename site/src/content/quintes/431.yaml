title: "Ne pas s’en laisser tomber"
soustitre: ""
lines:
  - "Parler à l’oreille du drame,"
  - "comme en retraite anticipée des"
  - "vacations à venir, yeux vitraux,"
  - "délivrera l’enjointe conjointe, bien y"
  - "désinachèvera la scansion du pair."
