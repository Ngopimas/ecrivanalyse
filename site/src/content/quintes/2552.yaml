title: "Enjeu en jeu en Je"
soustitre: "Bribé en peine d’être vécu"
lines:
  - "En commençant par la faim,"
  - "patachon qui mène sa vie ?"
  - "en pièce qui se manque :"
  - "créer l’art de son art –"
  - "à qui l’a bu l’abus."
