id: 2020
title: "Ce qui doit se faire"
soustitre: "Jeune se faisant diète étique"
lines:
  - "Orchestré par ce qui fourmille,"
  - "son film de hors convention,"
  - "se le donner à s’entendre…"
  - "ayant choisi de l’avoir été,"
  - "s’en sortir de son cadre…"
