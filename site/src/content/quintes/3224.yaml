title: "À la radio de soi"
soustitre: "Agréé volubile de brigadier bleu"
lines:
  - "Présageant le c’était mieux maintenant…"
  - "sous l’occupation de son temps –"
  - "à la frontière de l’illimitable ?"
  - "en retraite à la hussarde :"
  - "se sortir de ses lignes !"
