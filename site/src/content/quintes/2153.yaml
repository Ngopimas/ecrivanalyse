id: 2153
title: "Ce qui ne se dit"
soustitre: "Sotte périlleuse s’abreuvant en vain"
lines:
  - "Ce qu’on voit de soi"
  - "– étant où l’on se croit,"
  - "se récitant en insolite hère,"
  - "en chaussée trouée par décoration,"
  - "est convaincu d’amaranthe coordonnée gris-bleu."
