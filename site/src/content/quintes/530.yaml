id: 530
title: "Avoir un être à raconter"
soustitre: ""
lines:
  - "Les crins qu’ont les crocs,"
  - "avec la peine à pleurer,"
  - "l’envie bâtarde d’une femme-fille d’accueil"
  - "au beau rustique des yeux"
  - "d’alcool, regard en fourrière : nécessairement !"
