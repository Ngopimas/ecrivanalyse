title: "La durée de la difficulté"
soustitre: "Vitrail par la sélection immaternelle"
lines:
  - "Galon de sortir et rentrer,"
  - "une envie s’espère, telle une"
  - "armoire à glace et tout-le-bordel"
  - "atypiquement masculine : à la vie"
  - "de pourcentage, toute logique dehors."
