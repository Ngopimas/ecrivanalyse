title: "À qui ne vole pas"
soustitre: "Visitée froide en basse layette"
lines:
  - "À ce qui est payé,"
  - "à la place qu’on n’a,"
  - "Noël hors de la famille,"
  - "à l’écoute de son crayon…"
  - "pas sous-vente qu’on est vivante."
