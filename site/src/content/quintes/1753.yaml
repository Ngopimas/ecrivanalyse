id: 1753
title: "Ce qui s’envie un peu"
soustitre: "Déçue d’avances d’après modèle vivant"
lines:
  - "Ne dédaignant pas son effronterie"
  - "– chez-soi caché chez un homme,"
  - "se rendant un service d’excuse,"
  - "se consacrant plus de temps,"
  - "se séduire dans le fond…"
