title: "Le temps du contrat assigné"
soustitre: "Remix émotif d’un thème médical"
lines:
  - "Traité d’indépendance contre son gré,"
  - "cinquième boyau des beaux gosses,"
  - "donnant ce qu’on lui prend,"
  - "en tourneur de sa vie,"
  - "il prépare sa sortie d’évasion."
