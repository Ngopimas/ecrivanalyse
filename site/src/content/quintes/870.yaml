id: 870
title: "Les mots qui font vivre"
soustitre: "Pièce montée pour âme sonnée"
lines:
  - "Se divorcer du pied gauche,"
  - "avec l’impression d’être sur lui,"
  - "écorche la tétanyse, gage l’hédoniste"
  - "baignade de l’abandon du sentiment,"
  - "multiprise de multipère en Orang-Irang."
