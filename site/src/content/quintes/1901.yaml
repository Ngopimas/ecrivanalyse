title: "Ce qu’on ne dit pas"
soustitre: "Étude de musique au logis"
lines:
  - "En public de sphère intime,"
  - "en devoir fait d’être heureuse,"
  - "en impoli sacrifice de calvaire :"
  - "seule se considérant en relations"
  - "… se donner assez de confiance !"
