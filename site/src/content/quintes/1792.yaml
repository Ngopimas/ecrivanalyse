title: "Sa manière de se voir"
soustitre: "Éthos d’enseignante au visage intarissable"
lines:
  - "Partagée sur sa vie privée,"
  - "en bonne voie d’en changer,"
  - "à cheval sur ses délimitations,"
  - "n’apparaître si cloisonnée que ça,"
  - "confrontée au courage de continuer…"
