id: 3436
title: "À ça passe à côté"
soustitre: "Géolocalisée à un poil d’anonymat"
lines:
  - "Avec un hippotaxi du médiéval,"
  - "sans entrer dans son intimité,"
  - "ni passer sous son échelle,"
  - "ni se casser les miroirs :"
  - "se voir encor en vie."
