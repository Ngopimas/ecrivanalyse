id: 2496
title: "Ça ne peut être ça"
soustitre: "Nonne ravaudée en plaisir esthétique"
lines:
  - "Ce qui se règle seule,"
  - "en ni chaude ni froide :"
  - "être en son bon débarras ?"
  - "mais par ses propres moyens !"
  - "s’appréhende en petit cadeau d’être."
