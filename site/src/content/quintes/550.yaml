id: 550
title: "Sa place que l’on traverse"
soustitre: ""
lines:
  - "Drogue de la bonne volonté,"
  - "usée parfois par soi-même, révolte"
  - "du mensonge, enracinée dans les"
  - "branches, l’humanité permet de faire"
  - "l’amour au bénéfice des sens."
