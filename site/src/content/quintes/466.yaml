id: 466
title: "Se faire voir de l’extérieur"
soustitre: "Bessonne surprise en son aguet"
lines:
  - "Se faire noire de peur"
  - "qui, toujours prête à partir,"
  - "d’insatisfaire à confusion, s’attirant du"
  - "bruit des oiseaux de vent,"
  - "est habillée pour la forme."
