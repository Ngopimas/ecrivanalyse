id: 1906
title: "Ce que l’on peut faire"
soustitre: "Envoi en même langue maternante"
lines:
  - "Ne pouvant en faire l’économie,"
  - "munie des ponts du téléphone,"
  - "se racheter de son impression,"
  - "tapie où pouvoir se remettre,"
  - "afin de n’en pâtir d’empathir."
