title: "On ne se connaît pas"
soustitre: "Trame sortant naturellement de l’ordinaire"
lines:
  - "Se voir dans son idée,"
  - "qui se cache derrière soi,"
  - "être habituée à être gênée,"
  - "pouvoir être folle sans fard :"
  - "regarder ce que l’on montre !"
