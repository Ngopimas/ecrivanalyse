id: 2386
title: "Ça se touche à l’art"
soustitre: "Couillue ne se laissant s’impressionner"
lines:
  - "À l’échelon expérimental de vivre,"
  - "s’anecdoter en triée sur l’âge,"
  - "là où l’on découvre plus –"
  - "à poser la bouche nue –"
  - "que son bout de nez !"
