id: 1626
title: "Ce ça qui se trouve"
soustitre: "Rééquilibré cogitatif en l’inconnu rare"
lines:
  - "Qui ne se censure pas,"
  - "en pensant à son corps,"
  - "sans boire et sans fumer,"
  - "se prend la pause reposante"
  - "… d’une cascade de feu modèle."
