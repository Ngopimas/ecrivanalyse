title: "Aimer son regard sur soi"
soustitre: "Études chaotiques et sans fin"
lines:
  - "Aller jusqu’à se retrouver là-haut,"
  - "se trouver jolie très longtemps,"
  - "puis donner sa part absolue :"
  - "à vouloir un destin esthétique,"
  - "la sensation d’être plus complète."
