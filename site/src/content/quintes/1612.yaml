lines:
  - "Écœurée d’une aide à contre-cœur,"
  - "d’indigeste vent de double couche :"
  - "s’attendre à régler seule l’hémorragie"
  - "– heureuse de s’estimer encore humaine"
  - "– à la prochaine circonstance hors-concours."
