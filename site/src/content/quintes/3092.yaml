id: 3092
title: "À ça veut du bien"
soustitre: "Tarabiscotage d’une assuétude plutôt anachronique"
lines:
  - "À l’apparence d’un bon verbe,"
  - "non où l’on frôle l’indiscrétion,"
  - "où le définitif est promeneur,"
  - "en vérité qu’il faut rayer…"
  - "vouloir en venir au fait."
