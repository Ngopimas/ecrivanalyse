title: "Mon miroir de ma rue"
soustitre: ""
lines:
  - "Une Kère m’outrage au seuil"
  - "de sa grotte-papier, m’instrumente en"
  - "son monter-copier quotidien (une parenthèse"
  - "où me réfléchir) : petit chien"
  - "courant derrière un grand homme."
