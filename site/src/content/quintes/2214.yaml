id: 2214
title: "Ça ne tient qu’à soi"
soustitre: "Étrangée à se faire observer"
lines:
  - "S’arrivant comme quelque chose d’intéressant,"
  - "s’ouvrant la porte d’un huis-clos,"
  - "ce que l’on pourrait faire,"
  - "n’y étant pas encore prête,"
  - "se le mettre à l’endroit !"
