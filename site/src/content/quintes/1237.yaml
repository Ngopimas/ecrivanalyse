title: "5 ans à se justifier"
soustitre: "Adoration d’une envie de pleurer"
lines:
  - "Écrire bien sur sa vie :"
  - "femme à vision de métro,"
  - "reine civique en son paradoxe"
  - "– phénomène assez naturel chez soi,"
  - "partagée entre l’hétérogénéité des partages…"
