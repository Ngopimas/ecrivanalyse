id: 205
title: "Se prendre pour un reproche"
soustitre: "Du bagout entre quatre murs"
lines:
  - "À l’abri de l’incorruptible exemple,"
  - "se discute et se bavarde"
  - "Machine, le truc des choses,"
  - "pour qui le couple d’enfance"
  - "est une concession durablement déterminée."
