title: "L’étranger à sa langue natale"
soustitre: "Flore au degré nivelé d’écriture"
lines:
  - "Bien se décrire par curiosité,"
  - "oreille décollée aux yeux pliés,"
  - "n’étant pas un homme horrible,"
  - "nerveuse veste de temps contrasté,"
  - "qu’il se tuerait d’authentique ouais !"
