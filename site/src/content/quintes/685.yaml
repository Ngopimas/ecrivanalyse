title: "Un peu plus que normal"
soustitre: "Dernier cri de l’agente immobilière"
lines:
  - "Tout ce qui tourne autour,"
  - "avoir une impression de l’être,"
  - "s’apprêter à ne plus maquiller,"
  - "régler son compte à l’apparence :"
  - "perche blindée sur laquelle maligner."
