title: "La tristesse sur ses talons"
soustitre: "Choses écrites dans le besoin"
lines:
  - "S’expliquer avec son intimité émotionnelle"
  - "sous-développementée par son côté d’amour"
  - "et son oppression d’humanité massacrée"
  - "mais sans l’être simple continuaison :"
  - "« Maman, j’ai joint une fumée ! »"
