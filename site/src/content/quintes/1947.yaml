id: 1947
title: "Ce qui s’engage à soi"
soustitre: "Songe d’une chanson à interpréter"
lines:
  - "Finissant sa comédie-fluctuante en cours,"
  - "s’en faire encore qu’une banquette,"
  - "en témoignage de sa stipulation,"
  - "en légèreté qui n’est mauvaise :"
  - "en son-rythme qui se convient !"
