title: "Ce qu’on met en poche"
soustitre: "Intégrée au prix du silence"
lines:
  - "Dysqualifiée à la va vite,"
  - "à tel perçage de carapace,"
  - "car ni gâchette ni bichette,"
  - "se faire remâcher ses maux…"
  - "tant temps est remonté tentant."
