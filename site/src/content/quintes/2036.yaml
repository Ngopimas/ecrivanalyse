title: "Ce qui va être né"
soustitre: "Essuyeuse d’orages sortant ses pinceaux"
lines:
  - "Rarée se poussant au cul,"
  - "couplée avec un côté sage,"
  - "s’en laisser compter sur soi –"
  - "mais sans s’en laisser dompter…"
  - "jusqu’en avant-goutte à l’original discret."
