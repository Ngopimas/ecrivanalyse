title: "Pas à pas de famille"
soustitre: ""
lines:
  - "Au bout de huit mois,"
  - "vivant encore d’être en colère,"
  - "choisir de racheter son ventre"
  - "et, pour qu’importent les barrières,"
  - "se déballer le cœur Noël."
