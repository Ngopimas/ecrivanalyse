id: 862
title: "Le sentiment de la pulsion"
soustitre: "Limite qui pourrait être découverte"
lines:
  - "Relignée sans en être réprouvée,"
  - "trop appuyée d’un beau regard,"
  - "faire que l’impossible se revoie :"
  - "loyale pour s’être montrée juste,"
  - "gênée-gérée régénérée dans sa vie."
