title: "La politique de l’autre huche"
soustitre: ""
lines:
  - "Voir ce qu’on veut dire,"
  - "du registre de la méfiance,"
  - "qui l’énerve, le rend triste,"
  - "inverse l’empathie inéquitable d’une manipulation"
  - "où l’état seconde la gêne."
