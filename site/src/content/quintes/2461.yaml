title: "En balles de la vie"
soustitre: "Pétri des ânonneries qu’on semi-sème"
lines:
  - "Du bois qu’on se fait,"
  - "dent pour œil de lynx !"
  - "hère pour ère de dérision,"
  - "dans les coulisses de l’ombre,"
  - "être trublion enclin au sarcastisme…"
