id: 2414
title: "Ce qui vit avec soi"
soustitre: "Gaine de temps pour escorte"
lines:
  - "Dépendante de ce qu’on veut,"
  - "se provoquer à son travail,"
  - "s’être fichée de sa norme"
  - "et, mue dans son corps,"
  - "changer ce qui se plaît."
