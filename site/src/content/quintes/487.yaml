id: 487
title: "Beauté qui vient de soi"
soustitre: "Soin fourré pour des gamins"
lines:
  - "Se remettre d’être du désir :"
  - "un corps qui se regarde"
  - "dans les yeux - sans se"
  - "couper en deux, une séduction"
  - "de cicatrice, une vérité propre."
