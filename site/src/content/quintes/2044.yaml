id: 2044
title: "Ça se dit en corps"
soustitre: "Casée où l’on est sensée"
lines:
  - "Au nom de son émotion,"
  - "ne se blindant telle porte,"
  - "ni s’utilisant telle une arme,"
  - "se comprendre sans se pénaliser"
  - "… sans s’étriquer dans la rétractation."
