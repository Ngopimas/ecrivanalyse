id: 264
title: "Le goût du pas fini"
soustitre: ""
lines:
  - "Trop osée pour être crue,"
  - "nana ni tarée ni tarie,"
  - "l’habile l’y l’happe son sot-l’y-laisse,"
  - "juste au niveau du ventre,"
  - "sans mentir ni rater sentir."
