title: "Ce qu’on ne montre pas"
soustitre: "Profilée en cadrée sans contrôle"
lines:
  - "N’être tenue suggestive à distance,"
  - "n’étant pas un miroir déformant,"
  - "n’étant pas inaimable à pleurer,"
  - "n’étant pas invisible à creuser :"
  - "n’être niée pour rester enfant ?"
