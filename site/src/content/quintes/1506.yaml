title: "À un ami à soi"
soustitre: "Aventure à la fille toxicaine"
lines:
  - "Créé de ce qui existe,"
  - "le beau de plus belle…"
  - "passant des larmes au rire,"
  - "s’ouvre à l’harmonie du conflit,"
  - "fièvre colorée à l’appétit nourrissant…"
