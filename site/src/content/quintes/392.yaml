title: "Avoir une fuite au boulot"
soustitre: "Plateaux paysagés par la tache"
lines:
  - "Ne pas arriver à l’aimer,"
  - "le préférer strict avec arbres,"
  - "pour ne pas s’y désobliger,"
  - "s’y croiser bras et jambes,"
  - "requiert la grâce du rire."
