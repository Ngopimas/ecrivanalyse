title: "Prier de ne rien faire"
soustitre: ""
lines:
  - "À la croisade de béquille,"
  - "la révolue de son échelle,"
  - "cotée frivole à caractère amoureux,"
  - "débridée pratiquante, ne doute pas"
  - "d’être sûre de sa défensive."
