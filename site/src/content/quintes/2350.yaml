title: "Pas à côté de l’écart"
soustitre: "Bâtie en construction de profondeur"
lines:
  - "En s’inscrivant dans son métier –"
  - "de l’intérêt de s’en montrer ?"
  - "un peu comme en famille,"
  - "faire acte de son corps…"
  - "de l’atelier que l’on est."
