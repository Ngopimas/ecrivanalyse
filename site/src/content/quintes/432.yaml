title: "De sourire et de silence"
soustitre: ""
lines:
  - "Sous le contrôle de la"
  - "bonne distance du corps, une"
  - "sociologue du manque de l’imaginaire,"
  - "appâtée épatante, sans courage ni"
  - "détresse, prétexte le dernier moment."
