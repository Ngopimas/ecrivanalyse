id: 2306
title: "Ce qui est à soi"
soustitre: "Antidoté de l’exquise des cadavres"
lines:
  - "Poutre dans sa dent dure,"
  - "à la démontée des marches,"
  - "en s’affichant son tison rouge"
  - "… bon sens du n’importe quoi,"
  - "s’explorer en défieur de pesanteur."
