id: 2054
title: "Ce qui a dû l’être"
soustitre: "Caché composé en pièce mixte"
lines:
  - "Pied du mur du son,"
  - "apprêt à faire du bruit,"
  - "ce que l’on doit devenir,"
  - "aspire à s’y sentir inspiré,"
  - "s’éprouve à ne le rejeter…"
