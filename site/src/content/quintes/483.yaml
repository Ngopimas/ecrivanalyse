title: "Aux poings de s’en taper"
soustitre: ""
lines:
  - "À force de se manger"
  - "des carences, de se faire"
  - "refusée du latin - romain trahi,"
  - "de s’omettre, l’âme a-sacrée s’éprouve"
  - "être des armées de patience."
