title: "Le trou pas trop normand"
soustitre: "Fantaisie pas morte de mémoire"
lines:
  - "Fée qui fait le mur,"
  - "où le nain grandi ose,"
  - "elle fait l’elfe et l’armure,"
  - "en orque comme en ordinateur :"
  - "chevalière divaguant à l’indice chevalier…"
