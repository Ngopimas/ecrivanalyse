id: 186
title: "La vessie de la lanterne"
soustitre: ""
lines:
  - "L’exemplaire défaut fait trembler l’apparence,"
  - "désordonne d’observer son règlement antérieur,"
  - "à l’occasion d’une proposition indécise :"
  - "cette constante lune à tics"
  - "s’ennuie sans nuits de caractère."
