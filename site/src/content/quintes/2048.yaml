soustitre: "Φιλια s’inventant comme son mot"
lines:
  - "Endimanchée physiquement en son rendu,"
  - "se concentrer sur l’un-possible – non"
  - "ses viscères où sévices errent ?"
  - "s’écouter de son bon ton :"
  - "tout ça pour y arriver."
