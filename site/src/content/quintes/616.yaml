id: 616
title: "Avoir dû faire quelque chose"
soustitre: "Identité qui devient un papier"
lines:
  - "À s’en faire payer bénévolement,"
  - "se préoccuper des gens propres"
  - "à se lire dilatoires, chantiers,"
  - "sales des coffres de véhicule,"
  - "à s’y perdre le français."
