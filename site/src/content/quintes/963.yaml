id: 963
title: "Le suicide de la prothèse"
soustitre: "Jongleuse de feu sans monocycle"
lines:
  - "À l’ablatif de la morbidité,"
  - "posé comme nu, le modèle,"
  - "avec un air d’avoir maîtrisé,"
  - "jouira du cheveu décoléré et"
  - "aura pu trouver son corbeau."
