title: "Ce que l’on n’a pas"
soustitre: "Précipitée de kaïros par perversion"
lines:
  - "Être l’objet de son acte,"
  - "s’incorporer à l’art de voir,"
  - "prendre date avec son manque,"
  - "déprimée en un sas d’entre-deux-sons,"
  - "en profiter pour s’éventuellement gagner."
