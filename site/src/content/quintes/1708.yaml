title: "Ce que l’on a lu"
soustitre: "Polie valant indifférence de l’indéfendable"
lines:
  - "Le rêve qui se vit,"
  - "larme dont on se sert,"
  - "c’est ce qui se correspond,"
  - "oasis qu’on n’a jamais désertée,"
  - "randonnée sortant des rangs donnés !"
