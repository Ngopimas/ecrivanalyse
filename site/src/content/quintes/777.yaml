title: "Des faire de la peur"
soustitre: "Métatélépathie des cinq sans ans"
lines:
  - "Parfaitement là où il faut,"
  - "se réfléchit dans le monde,"
  - "s’y ionne et aussi papillonne,"
  - "comme preuve l’amour de soi :"
  - "disante métaphore du plus faible !"
