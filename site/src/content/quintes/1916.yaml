id: 1916
title: "En vie à se sourire"
soustitre: "Verbalise en habit tué d’habitude"
lines:
  - "Faire ce que l’on attend,"
  - "à se raconter ses histoires,"
  - "en direction de son chemin,"
  - "en s’invitant à son anniversaire,"
  - "en mots d’automne pas monotones…"
