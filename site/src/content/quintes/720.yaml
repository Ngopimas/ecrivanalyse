title: "Dans le froid au chaud"
soustitre: "Franchissement si l’étoile est musée"
lines:
  - "Odeur fixe s’attendant à l’image :"
  - "humeur dépendant de l’être parfaite,"
  - "instant donné bombardé de crédibilité,"
  - "mélange de deux perspectives différentes,"
  - "vision intéressante aux pupilles maquillées !"
