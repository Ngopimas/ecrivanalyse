id: 261
title: "Ne pas en rester là"
soustitre: ""
lines:
  - "Singularité conjonctive où Mona cilla,"
  - "soliloque si labile sous monosyllabiques,"
  - "le parallèle fut vite fait :"
  - "les courbes vagues n’attendent pas,"
  - "elles s’alignent sur le temps."
