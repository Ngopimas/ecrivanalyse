soustitre: "Fiche d’appointements pour bonne faussaire"
lines:
  - "Faire tout dans son lit,"
  - "pouvoir se voir à temps,"
  - "s’alléger le cœur en faim,"
  - "s’agir de quitter les liens :"
  - "avoir besoin de se nourrir !"
