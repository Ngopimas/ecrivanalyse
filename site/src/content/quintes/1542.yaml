id: 1542
title: "Se dire oui à soi"
soustitre: "Beaux beaux de la mamma"
lines:
  - "Sphinctérienne joueuse d’un tangible ersatz…"
  - "épanouie par sa castration académique,"
  - "étonnée de n’en être empêchée…"
  - "comprise en besoin de l’être,"
  - "créée avec qui elle crée…"
