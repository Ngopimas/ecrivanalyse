id: 1923
title: "De quoi ça se sort"
soustitre: "Toute en mineur tout ornée"
lines:
  - "S’exposant au danger d’être chanceuse"
  - "– se demandant ce qu’on demande,"
  - "comprendre ce que l’on cherche"
  - "… si l’on se laisse dessiner,"
  - "le sens de sa question."
