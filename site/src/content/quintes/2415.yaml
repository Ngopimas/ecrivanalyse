id: 2415
title: "Ce qui peut se voir"
soustitre: "Norme dont on fait partie"
lines:
  - "Jouant davantage la bonne humeur,"
  - "ne pleurant peut-être pas assez,"
  - "ayant envie de se fréquenter :"
  - "se retrouver libre d’être soi,"
  - "où l’on ne s’attendait pas !"
