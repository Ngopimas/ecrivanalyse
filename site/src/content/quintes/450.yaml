id: 450
title: "Meilleur plus petit que soi"
soustitre: ""
lines:
  - "Le brodé âpre autocolle, le"
  - "reconnaissant de son frère, trame"
  - "minutieux les dégradés de poils :"
  - "s’attaquant à la famille, il"
  - "réalise ce qu’il veut réussir."
