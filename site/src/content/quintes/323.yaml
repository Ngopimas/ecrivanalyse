id: 323
title: "Être occupé par un rien"
soustitre: ""
lines:
  - "Avoir beau le photographier ne"
  - "suffit pas à s’y voir,"
  - "mais s’extirper de sa compétition,"
  - "sécuriser, vitaliser, peut permettre de"
  - "s’entendre à masser le temps."
