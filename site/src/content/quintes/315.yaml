id: 315
title: "La vie fait le travail"
soustitre: ""
lines:
  - "Après s’être lâché les basques,"
  - "imperfectionnissime de bile en ville,"
  - "avoir échoué à son Paris,"
  - "à la marge d’une rencontre,"
  - "consentir à bâtir même différend."
