id: 215
title: "Réticence à ne pas pouvoir"
soustitre: ""
lines:
  - "Désolée dézélée désellée, dessolée desseulée,"
  - "la fresque-île s’extérieurise du naufrage :"
  - "exposée à l’explosion, elle s’expulse,"
  - "vire à la porte ouverte,"
  - "à tomber le phare ouest."
