title: "Être dans assez de bras"
soustitre: "Complétion pour ramassage de râteaux"
lines:
  - "À la distanciée de garde,"
  - "être l’employé à se cacher,"
  - "à la sœur dinguement discrète"
  - "d’une heure pour se réveiller :"
  - "pote-pote couci-couça, ça se soûle."
