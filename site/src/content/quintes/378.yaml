title: "Le petit non d’une fille"
soustitre: "Supplice de la porte ouverte"
lines:
  - "À la place du marié,"
  - "mécompte qui barre les jours,"
  - "s’exécute le clash tanné d’étonnant"
  - "qu’insoufflèrent des idées et d’odieuses,"
  - "chagrines d’amour, comme d’un excès."
