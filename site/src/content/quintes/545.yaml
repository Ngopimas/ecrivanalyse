id: 545
title: "La sortie de son corps"
soustitre: ""
lines:
  - "Faiblesse des mots des maux,"
  - "trop-plein de bien naître, poids"
  - "lourd point mort, inculpé inculqué,"
  - "l’amer grand perd uniquement que"
  - "d’aller au-delà de ses espérances."
