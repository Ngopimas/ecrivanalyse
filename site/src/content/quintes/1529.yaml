title: "Qu’on se donne à voir"
soustitre: "Planque cousue de cheveux blancs"
lines:
  - "À son ordre de l’intime,"
  - "son répondant de ses actes,"
  - "s’agrandir les yeux à l’autre…"
  - "un transigeant aux bons goûts…"
  - "improbables de la pimbêche adulte."
