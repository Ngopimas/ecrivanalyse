id: 516
title: "Pousser le meilleur à être"
soustitre: "Dialogique du passer à travers"
lines:
  - "À la confiance du manque,"
  - "se qualifier de son incompétence,"
  - "se prendre au je, calibre"
  - "du héros par les bornes :"
  - "se satisfaire de ses besoins."
