id: 2309
title: "Mars qui est à Paris"
soustitre: "Irrépertoriée en une dénature morte"
lines:
  - "En peignante pour cheveux courts,"
  - "faire presque partie du décor,"
  - "aux dépens de qui dépend,"
  - "ce qui peut être agréable."
  - "Ce qu’on ne va cacher…"
