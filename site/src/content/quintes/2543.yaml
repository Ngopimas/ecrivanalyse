id: 2543
title: "À ce qu’on ne sait"
soustitre: "Ourlé rythmant ce qui s’encre"
lines:
  - "S’abstenant du choix de l’abstention,"
  - "en des engagements à l’optimisme,"
  - "frangé ne s’évertuant dans l’œuf,"
  - "en frangin ne s’ennuyant pas,"
  - "ne se rejeter de l’autre…"
