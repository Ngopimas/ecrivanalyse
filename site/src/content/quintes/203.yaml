id: 203
title: "L’astre-feu mêlé à l’âme antireligieuse"
soustitre: ""
lines:
  - "Maux tonnés mais notés, menottés,"
  - "monotones mots damnés mais donnés,"
  - "m’étonnez, virtueux vœux vers « tu-oses- ? »,"
  - "tentative à tenter d’attentive attentée,"
  - "repérage réparant dérapant des parages."
