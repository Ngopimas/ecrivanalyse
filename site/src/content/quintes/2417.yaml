title: "Ce qui est peu mentir"
soustitre: "Visiteur du vrai du faux"
lines:
  - "Allant s’enfermer où ça libère,"
  - "imaginé où fait n’est hantise,"
  - "qui n’est pas qu’une phrase,"
  - "protégé en forme de livre,"
  - "faire partie de ses rites !"
