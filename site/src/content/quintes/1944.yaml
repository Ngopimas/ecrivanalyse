id: 1944
title: "Qui est de son lux"
soustitre: "Blizzarde au chez-soi de l’extérieur"
lines:
  - "Composante de ses personnages d’acquiescements,"
  - "murmurante mi-hop mi-séance de cinéma,"
  - "onomatopée ne disant forcément zut,"
  - "fenêtre de bon ton soporifique…"
  - "ce qui s’excite encore ici-bas."
