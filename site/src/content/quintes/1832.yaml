title: "Au si tôt que prévu"
soustitre: "Haute et forte d’avant catastrophe"
lines:
  - "À la réclame du soleil,"
  - "une à moins son plus-un,"
  - "maillon du bon tant pris…"
  - "être minute qui sait respirer,"
  - "sans savoir qu’elle est l’heure !"
