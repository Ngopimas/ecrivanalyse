id: 1781
title: "À l’instant de sa vie"
soustitre: "Réale littéraire pour deux réaux"
lines:
  - "Gagnant bien sa propre vie,"
  - "la jeune femme en redevenir,"
  - "n’étant pas pire qu’une fiction,"
  - "méliorative qui s’offre ses mots…"
  - "se découvre ne semblant dissimuler !"
