id: 2671
title: "Ça se met en joie"
soustitre: "Tambouillante qui dissipe sa dissipation"
lines:
  - "Désembarrassée des facilités de l’exigence,"
  - "ne s’insuffisanter de se surprendre,"
  - "ne s’obliger à ses gratitudes"
  - "– ce qui n’est pas bête,"
  - "ne se passer à côté."
