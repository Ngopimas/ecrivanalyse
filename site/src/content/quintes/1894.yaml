id: 1894
title: "Les sens que l’on est"
soustitre: "Naïve à la peau violette"
lines:
  - "À avoir raison de soi,"
  - "où ses pas se mènent,"
  - "être ce qui se change :"
  - "sans se piéger tout seul"
  - "… ce qu’on fait de bien."
