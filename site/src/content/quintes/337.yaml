id: 337
title: "Avoir son imago en qualité"
soustitre: ""
lines:
  - "Flou narcistique où border l’âme,"
  - "se changer des pusillanimités picturales,"
  - "l’antinomie touristique d’une affectation saugrenue"
  - "- se retenir de tout lâcher -"
  - "avec exactitude ne répond pas."
