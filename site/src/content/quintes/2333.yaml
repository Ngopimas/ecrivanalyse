id: 2333
title: "À son job en off"
soustitre: "Étain celé de qui performe"
lines:
  - "En musicienne de ses grincements…"
  - "pouvant être sa meilleure idée –"
  - "se modelant en sa rébellion,"
  - "se classant en ses ouïes :"
  - "on n’a que le temps."
