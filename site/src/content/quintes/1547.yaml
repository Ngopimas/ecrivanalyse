title: "Où l’on est le héros"
soustitre: "Fameux manuscrit parlant de soi"
lines:
  - "Se laisser le plaisir d’impressionner"
  - "son bluff, d’entretenir son suspens"
  - "et d’assoiffer sa curiosité ; rôder"
  - "à s’aborder sa mine atterrée :"
  - "cette foi, c’est la bonne !"
