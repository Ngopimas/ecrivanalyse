id: 1786
title: "Qui ne va se visiter"
soustitre: "Douée de son indécise bienveillance"
lines:
  - "Plus vraie qu’une meilleure version,"
  - "se rendre d’autant plus curieuse,"
  - "en se prenant comme modèle,"
  - "qu’on pourrait en être fière,"
  - "si l’on pouvait y assister !"
