id: 1882
title: "Là où l’on a grandi"
soustitre: "Embriqués s’imbriquant où ils s’embarquent"
lines:
  - "Ce qui dure quelque plus,"
  - "qui se livre pour mémoire,"
  - "l’autre façon de se déplacer :"
  - "pas barbante pour n’être lourde,"
  - "serait-ce le processus de l’atterrissage…"
