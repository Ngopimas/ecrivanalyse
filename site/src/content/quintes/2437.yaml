title: "Ce que l’on fait là"
soustitre: "Enthousiasmée tangible en fresque parfaite"
lines:
  - "Nourrie par la parole portée,"
  - "où l’on se donne confiance,"
  - "où son cerveau est libéré,"
  - "où son temps est filé ?"
  - "se plaire à ce faire."
