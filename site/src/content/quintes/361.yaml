title: "Un sens à un moment"
soustitre: "Souvenir en mouvement de voix"
lines:
  - "Sonorités répétées du mot sonorité,"
  - "jaillissement de l’au-delà du sous-rire,"
  - "grâce qui pense vers l’esprit"
  - "frais, un peu de ce"
  - "qu’on veut : dense qui sursaute !"
