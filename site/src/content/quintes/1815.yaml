title: "Ce qui est déjà ça"
soustitre: "Jouté qui gagne à s’ exerguer"
lines:
  - "Au top de sa forme"
  - "– avec ses hauts et bas,"
  - "en cheveu sur un plateau –"
  - "significa-tif qui suit son instant,"
  - "s’offrir en admiration sur pied-d’estime !"
