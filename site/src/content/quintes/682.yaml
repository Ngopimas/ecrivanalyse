title: "En cours de pas beaucoup"
soustitre: "A priori pauvre petite chose"
lines:
  - "Le don de se cogner,"
  - "avec la colère contre soi :"
  - "la super ficelle du pathétique,"
  - "sa mémoire de la perdre :"
  - "le faire de sa vie !"
