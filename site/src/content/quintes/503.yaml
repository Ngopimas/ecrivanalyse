title: "Être libre d’être avec l’autre"
soustitre: "Écrasement du piège de soi"
lines:
  - "Se découvrir tombé des nues,"
  - "respecter ses propres règles, et"
  - "respirer son aisance, se feuilleter :"
  - "laisser les phrases se préciser"
  - "et la profondeur refaire surface."
