title: "Être poli avec le danger"
soustitre: "Discipline du son qui pique"
lines:
  - "Si c’est une grande marque,"
  - "y étoffer une nouvelle société,"
  - "se permettre d’y aller peut-être"
  - "et, pour l’iroquois d’harmonica, d’y"
  - "voler au-dessus de l’énormité normale."
