id: 533
title: "Ne pas s’aimer en dieu"
soustitre: ""
lines:
  - "Figuré au répertoire d’une bousille,"
  - "ce qu’on fait de soi-même,"
  - "ésotérie se comprenant de soi,"
  - "de ceux qui nous entourent,"
  - "l’injuste code d’en être s’insupporte."
