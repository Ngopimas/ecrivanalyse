id: 1826
title: "Ne se forcer à rester"
soustitre: "Déménagée qui s’abstient de s’annuler"
lines:
  - "Sur le devant de l’alèse,"
  - "ne pas être trop curieuse,"
  - "fermer les yeux en souriant,"
  - "sans se disputer avec soi-même,"
  - "à l’organisation de son anniversaire…"
