id: 2650
title: "Où le temps a lieu"
soustitre: "Croustillante qui se fait palpiter"
lines:
  - "Prête à la seconde près,"
  - "à la lumière d’une sieste,"
  - "à l’unicité de ses plagiats,"
  - "veillant à n’être pas vieillie,"
  - "se désintoxiquer de la veille."
