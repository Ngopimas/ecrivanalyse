title: "Oser ne pas dire non"
soustitre: ""
lines:
  - "Une curiosité qui l’est d’elle-même,"
  - "déambule à la richesse du"
  - "temps perdu, s’ourle à la"
  - "limite du ridicule, se lèvre :"
  - "grain, folie et puis derme."
