id: 2028
title: "Le rien à faire ici"
soustitre: "Patientée boycottant une réminiscence théoriste"
lines:
  - "En rien de plus vrai,"
  - "échappée à sa vie salée,"
  - "en joueuse de son destin,"
  - "s’ouvrir en porte à fermer :"
  - "l’amour de quoi se parler…"
