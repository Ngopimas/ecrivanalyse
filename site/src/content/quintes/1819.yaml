title: "Où l’on a le choix"
soustitre: "Funky de n’être pas marrant"
lines:
  - "En traitement statistique d’une singularité,"
  - "s’ôter la pellicule de contradiction,"
  - "en être de son développement"
  - "… tâcher de ne se faciliter,"
  - "en premier de ses autres."
