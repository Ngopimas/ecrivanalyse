title: "Ce qu’on ne voit plus"
soustitre: "Canon pour un portrait portraiturant"
lines:
  - "Cicatrisant en forme de signatures,"
  - "s’entraînant à se laisser entraîner,"
  - "s’attirant à n’être pas terrifiant,"
  - "se casser sans plus lézarder…"
  - "Se mener à son entretien ?"
