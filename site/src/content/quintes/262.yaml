title: "Le salarié du bon moment"
soustitre: ""
lines:
  - "N’être pas seul en ville"
  - "requiert un égoïsme franc, intuitif,"
  - "qui sait plus qu’il sait :"
  - "aguet inouï, titube à essai"
  - "où gagne ce qui touche."
