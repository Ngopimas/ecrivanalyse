title: "Su que ça se fait"
soustitre: "Illustratrice s’illustrant à être illustrée"
lines:
  - "Mouvementée par une rencontre soudaine,"
  - "sérendipitée à son adresse corporelle,"
  - "mascaradée à s’en faire payer…"
  - "étant clef de son moment,"
  - "se mettre dans le coup."
