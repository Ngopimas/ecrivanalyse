soustitre: "Débordonnée ne s’aidant au sacrifice"
lines:
  - "Renforcement musculaire d’une mue scolaire,"
  - "assouvissement de sa partie androgyne"
  - "– avantagée de n’être un homme,"
  - "à mûrir en lignée d’égoïste,"
  - "un fait à moitié fête !"
