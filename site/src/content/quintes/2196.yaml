title: "Ça se voit de dos"
soustitre: "Boutonnée à ne l’être plus"
lines:
  - "Ce que l’on se caresse,"
  - "tels des espoirs sans gêne,"
  - "intime son ordre de l’intime,"
  - "s’énonçant tel en corps enjoints :"
  - "d’où est écarté le recroquevillement."
