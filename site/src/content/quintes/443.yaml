title: "La mort de sa vie"
soustitre: ""
lines:
  - "Ce qui l’anorexise en multitude"
  - "- ce qui ne s’implique pas,"
  - "tendanse à se mettre poids,"
  - "qui aussi contraintes lui contrarie,"
  - "or l’avalide en supérieurement normale."
