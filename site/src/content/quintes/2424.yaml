title: "En sel que l’on fut"
soustitre: "Excentriciter au temps d’une concordance"
lines:
  - "Ayant eu jusque-là des cheveux !"
  - "à la boucle d’une réécriture ?"
  - "s’adoucir comme à la vie,"
  - "se savourer à sa coupe :"
  - "être ce qui se change."
