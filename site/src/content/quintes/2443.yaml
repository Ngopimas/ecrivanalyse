title: "Ce qui se le dit"
soustitre: "Accordée au temps de retard"
lines:
  - "En passerelle musée d’art quotidien,"
  - "en participant à sa respiration,"
  - "en ce qui vaut l’après-coup,"
  - "comme scotch à la poste !"
  - "se confier à son instinct."
