title: "Sur les hauteurs des plafonds"
soustitre: ""
lines:
  - "Même si elles sont perfides"
  - "à la place d’un personnage,"
  - "les ressemblances avec soi, mêmes,"
  - "préoccupantes désinvoltures, sont filles des"
  - "fortunes d’une admirable image innée."
