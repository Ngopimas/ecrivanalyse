id: 3146
title: "À la clef son don"
soustitre: "Algorythmé par la grande bassine"
lines:
  - "À lire hors de l’école,"
  - "où n’être noir ou blanc,"
  - "et soutenu par le langage,"
  - "se hasarder au hasard d’eux :"
  - "ces autres déserteurs des heurtés."
