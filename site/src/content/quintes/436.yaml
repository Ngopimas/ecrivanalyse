title: "La face cachée du cerveau"
soustitre: ""
lines:
  - "Allergique et les gants mathématiques,"
  - "vrai organe vital qui flâne-glane,"
  - "empêché de rêver en rue"
  - "- sous les pavés la pilule,"
  - "se gratifie d’un souple musculaire."
