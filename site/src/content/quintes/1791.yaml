id: 1791
title: "Un rien à sa place"
soustitre: "Prévu toucan à jamais raconté"
lines:
  - "Il n’atteint pas sa vie,"
  - "qui se réclame de l’argent"
  - "– l’or d’un honnête mot ment !"
  - "l’échafaudé calcin d’inévitable inné vital"
  - "… nature luxuriante d’une famille psychanalyste…"
