title: "S’il y avait la guerre"
soustitre: ""
lines:
  - "Mots perdeux, détachés d’essence, horribles"
  - "bornes mimétiques, anniversaires de pipeau :"
  - "l’ami masculin plus admirablement plaisant"
  - "résisterait-il déjà un peu, parti"
  - "prendrait, sans dodo, façon, fuite ?"
