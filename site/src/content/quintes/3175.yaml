title: "À qui en a besoin"
soustitre: "Alignée de noir et pendu"
lines:
  - "Vieillissante où l’aspiration pro fonde :"
  - "sans gyrophare à l’hanneton mort !"
  - "prendre ses racines en mains –"
  - "voulant bien se faire inviter,"
  - "ayant le luxe du oui…"
