id: 1851
title: "Au filtre de la vie"
soustitre: "Anglé à s’inscrire en mettre-mots"
lines:
  - "En but de le trouver,"
  - "au monde pour en créer,"
  - "à l’envie qu’on se découvre,"
  - "être le chemin qu’on fabrique,"
  - "d’avoir trop souffert de sous-faire."
