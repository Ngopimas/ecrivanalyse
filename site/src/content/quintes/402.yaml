title: "La pause de l’écrit vaine"
soustitre: "Mises à nu de voisinage"
lines:
  - "Immondice encourageante inlassée de son"
  - "quartier intérieur, inconnue familière, voire"
  - "à quel point concrète ! entre"
  - "arrogance travestie et l’abri des"
  - "passions insignes, la vie persiste."
