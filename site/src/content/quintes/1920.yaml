id: 1920
title: "Ce qui est en vie"
soustitre: "Neufs stylés à la pas-lourde"
lines:
  - "À l’auberge où l’on revient,"
  - "ne brûlant pas le printemps !"
  - "respectant le goût du respect…"
  - "civiles personnes d’avoir du chien :"
  - "être manifestement les forts d’entendre."
