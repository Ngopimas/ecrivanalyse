id: 2141
title: "Ce qui ne se choque"
soustitre: "Naturiste vivant en aucune génération"
lines:
  - "Se détricotant sans s’en excuser,"
  - "en s’aimant sans s’en inquiéter,"
  - "ne se grugeant sans perroquet,"
  - "se protégeant de sa retenue…"
  - "se laisser prendre en qualité."
