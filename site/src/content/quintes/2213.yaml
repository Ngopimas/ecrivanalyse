id: 2213
title: "Ce qui ne se loupe"
soustitre: "Façonnée dans de beaux draps"
lines:
  - "À la fin de l’histoire,"
  - "ce qu’on suit comme ça,"
  - "qu’on essaie de s’apprendre adulte,"
  - "qui ne se reproduira peut-être"
  - "… c’est l’éventail de sa conviction !"
