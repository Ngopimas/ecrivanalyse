id: 287
title: "Ça veut dire la solitude"
soustitre: ""
lines:
  - "Sortir en boîte enferme l’amertume"
  - "d’une éconduite, malmenée, malentendue, méchancetée,"
  - "au rendez-vous amusant un peu"
  - "et attirant déjalousie des filles :"
  - "c’est pour calculer du temps."
