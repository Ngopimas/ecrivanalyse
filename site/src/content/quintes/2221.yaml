id: 2221
title: "Ce qui se fait être"
soustitre: "Servi à n’être pas statue"
lines:
  - "Se réconciliant avec ses hiérarchisés,"
  - "évoluant depuis peu jusqu’à assez,"
  - "trahi par son hypocrite loyauté,"
  - "s’entendre plus parler de soi"
  - "… se tirer vers le beau !"
