soustitre: "Horlogée où l’on peut s’arrêter"
lines:
  - "Charpente de son propre mystère,"
  - "s’échapper vers ce qui échappe,"
  - "en direction de sa profondeur,"
  - "en qualité d’élue et relue :"
  - "en plein dans sa vie !"
