title: "Coup à ne pas boire"
soustitre: ""
lines:
  - "À l’abri de son protocole,"
  - "qui ne devrait pas être,"
  - "à l’université de son chahut,"
  - "s’obture le dedans du spécimen :"
  - "au rai de sa rotule !"
