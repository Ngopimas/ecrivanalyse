title: "Ce qui se plaît ici"
soustitre: ""
lines:
  - "Une grosse bague au pied-bleu,"
  - "aux périls de ses risques,"
  - "en réponse que ça s’apporte,"
  - "à quelques années d’être gênée,"
  - "donne pouvoir d’être n’importe qui."
