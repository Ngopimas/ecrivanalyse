title: "Pour ne pas s’arrêter là"
soustitre: "Lard de se rentrer dedans"
lines:
  - "Ne pas prêter à interprétation,"
  - "faire une vente d’à-propos, avec"
  - "l’esprit de l’escalier, l’entrain de"
  - "prendre tournure... lors que le"
  - "renoncement d’un fils est né."
