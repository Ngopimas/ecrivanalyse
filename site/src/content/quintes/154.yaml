prose: |-
  Elle voit le rouge taché sur le tissu ! Elle croit qu’elle est très malade, qu’elle va mourir ! Elle demande à sa grand-mère d’où cela vient, ce qui se passe ! Sa grand-mère lui répond qu’elle n’a qu’à demander à sa mère ! Sa mère lui répond que toutes les femmes ont ça !
  Elle a été tellement triste durant un couple de <i>mois</i> ! L’autre <i>moi</i> ne voulait pas recommencer comme son père ! Le <i>moi</i> d’elle ne voulait pas recommencer comme sa mère !
  Toute la famille s’accroche, quand il y a du vent ! dans la bonne maison ! pas celle de sa grand-mère, qui n’était pas sa mère ! pas celle de sa mère, qui n’est presque pas sa mère ! pas celle de sa chimère, qui ne sera pas sa mère !
  C’est resté bloqué là, dans ce jardin, avec ses maisons : la grande maison de la grand-mère, la maison vert tendre de la mère et la petite maison lumineuse et aux couleurs chaudes et éclatantes de la petite fille !
  En construisant sa maison dans le jardin où les mamans ont leur maison, que devient la petite fille !
  C’est l’histoire d’une petite fille ! La petite fille qu’elle aurait voulu être ! La petite fille qu’elle aurait voulu avoir !
  L’histoire où il est possible d’être et d’avoir tout à la fois :
