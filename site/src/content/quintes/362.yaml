lines:
  - "Aussi peu que pas inconsentante,"
  - "l’éprendre faims d’emmerder les réponses"
  - "les veillées du pater parti"
  - "- fatum intermédiaire chasseur des fixettes ! -"
  - "manquera de ne pas échapper."
