id: 1440
title: "Bien à parler de soi"
soustitre: "Équilibrée par une riche préoccupation"
lines:
  - "Étant utile pour quelqu’un d’autre,"
  - "vivifiante par la juste entreprise,"
  - "malgré sa peur de l’attirance,"
  - "se redonnant à son image :"
  - "ce qui s’épanouit en elle."
