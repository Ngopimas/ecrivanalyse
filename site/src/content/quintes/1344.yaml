id: 1344
title: "Voir ce qu’on en fait"
soustitre: "Assoupissements des coups de pompe"
lines:
  - "La dernière que l’on a,"
  - "y déambuler telle une rate,"
  - "en cette résistance des libérés,"
  - "détonation de l’écrit du silence :"
  - "ne pas s’empêcher de s’empêcher."
