title: "Ça se parle de soi"
soustitre: "Amicalaimante qui ne s’énerve pas"
lines:
  - "S’abandonnant à ne plus lutter,"
  - "girouette encrée à la toquade,"
  - "se retrouvant à se délimiter,"
  - "à s’enraciner dans le vent :"
  - "être qui squatte chez soi."
