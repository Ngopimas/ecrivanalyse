title: "N’être pas sœur à l’être"
soustitre: ""
lines:
  - "Que l’adulée sente, malgré sa"
  - "carapace de limace, qu’elle mérite"
  - "qu’on s’arrête - apogée, permet de"
  - "se mettre dans son optique"
  - "d’une première de la chasse."
