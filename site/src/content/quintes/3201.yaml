title: "À ce prix sur soi"
soustitre: "Vénielle comme s’énonçant en non-sujet"
lines:
  - "Sachet de souffrance en souffrance –"
  - "en merveilleuse de ses banalités,"
  - "pouvoir se faire entendre dire :"
  - "en sa punition d’une cystite ?"
  - "sa liberté d’un temps mort…"
