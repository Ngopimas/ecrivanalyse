id: 3300
title: "À un peu de force"
soustitre: "Pelliculage de ne se remédier"
lines:
  - "Suffisamment incompréhensible pour être vrai,"
  - "s’extirper de sa forme d’embarras ?"
  - "reproduite d’un jour de soleil :"
  - "se faire vivre une photo…"
  - "rire au nez de l’erroné."
