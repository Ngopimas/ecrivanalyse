title: "Où il n’y en a"
soustitre: "Mauve de puissance en puissance"
lines:
  - "Avec sa nudité en accessoire,"
  - "s’attacher à ce qu’on voie,"
  - "au cœur de la symétrie,"
  - "à la place d’une gêne :"
  - "ce qui se trouve beau."
