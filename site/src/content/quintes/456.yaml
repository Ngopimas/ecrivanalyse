title: "Le canular de la garantie"
soustitre: "Faire-part de se faire peur"
lines:
  - "Brève thèse, poule à papa,"
  - "vague à l’être-jolie d’être là,"
  - "contre au divan du temps"
  - "à la volée, s’insolite des"
  - "côtoyées sa partie de tissu."
