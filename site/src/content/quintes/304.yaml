title: "Riposte du toc au toc"
soustitre: ""
lines:
  - "Déplacée, la partie de quelque"
  - "chose s’engage, à volonté, illimitée,"
  - "à l’impossible, draguée d’odyssée, à"
  - "prendre beaucoup de trucs, manquée :"
  - "esprit de l’être de rupture."
