title: "Ce qui ne se gâte"
soustitre: "Désarçonnante à ne pas trébucher"
lines:
  - "Compromis prévalant sur con promis,"
  - "mouvante sur des sables mouvants,"
  - "être qui, s’approchant du courage,"
  - "se satisferait en même temps"
  - "ce qui serait très bien."
