id: 317
title: "Le fatal d’être une femme"
soustitre: ""
lines:
  - "Une boule qui monte, sans"
  - "cri, égare, s’apprête, de se"
  - "penser ronde, à se délaver,"
  - "sans se concevoir, en une"
  - "descendance dévalée de l’arme séductrice."
