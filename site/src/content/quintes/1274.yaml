title: "Il est temps pour elle"
soustitre: "Cordon-bleu blanc-rouge dans sa marinière"
lines:
  - "Ivory au pays des vermeilles,"
  - "souriant au visage du radiateur,"
  - "y pensant tel authentique inespéré,"
  - "se donnant l’autorisation d’être réelle,"
  - "se remercia d’avoir maquillé l’histoire…"
