id: 1865
title: "Ce qu’on va en faire"
soustitre: "Alternativité en pièce de résistance"
lines:
  - "Vidé de son plein gré,"
  - "ce que l’on sait vierge,"
  - "en clé de son trousseau,"
  - "ce qui s’inquiète pour soi,"
  - "en être la demandeuse tacite…"
