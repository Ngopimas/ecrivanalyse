title: "Se prendre dans les bras"
soustitre: ""
lines:
  - "Zèle associé aux roses, pépin"
  - "de l’épine attachée à ce"
  - "nom d’innocence, non pas de"
  - "jeune fille, entre le rot"
  - "et le bain : attrait d’union."
