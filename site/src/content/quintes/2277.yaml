title: "La prise en un moi"
soustitre: "Apeurante en sa navigation roturière"
lines:
  - "S’arraisonnant à l’horizon d’une rue"
  - "prenant l’avion pour un voilier"
  - "en assez peu courant marin,"
  - "être restée sur ses gardes :"
  - "pirate qui, au pire, rate."
