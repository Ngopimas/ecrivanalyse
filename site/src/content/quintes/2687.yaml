title: "Ça s’offre à se voir"
soustitre: "Saisonnalisée se desserrant le calendrier"
lines:
  - "Ayant encore chaud aux ailleurs,"
  - "ne laisser tomber que l’agonie !"
  - "En ne s’enfermant en ferment,"
  - "s’inviter à s’incarner en corps,"
  - "trouver le frais du crépuscule."
