id: 1776
title: "Ce que ça peut être"
soustitre: "Hymne fragrant ès considérations individuelles"
lines:
  - "En bonbon donné à l’inconnu,"
  - "en mémoire de son tact…"
  - "être ce qui devient rare,"
  - "pour sa part de l’autre,"
  - "le reste de son corps…"
