title: "Se faire dans la vie"
soustitre: "Universalisée en perturbation du flou"
lines:
  - "Substituant le volontiers au volontaire,"
  - "les aventures aux délires toxiques,"
  - "le discernement à des insoucis,"
  - "ne passer à côté d’inspirer"
  - "… de la valeur en soi !"
