title: "Où les cœurs y sont"
soustitre: "Rebattue en une décennie blanche"
lines:
  - "Oui de tous ses noms,"
  - "au pied levé des corps,"
  - "choix de ne l’avoir plus,"
  - "de se faire en catastrophe :"
  - "n’oublier pas sa liste détache."
