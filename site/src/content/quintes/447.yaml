title: "Avec cela faire cela avec"
soustitre: ""
lines:
  - "L’altération du temps passé ensemble,"
  - "en-dehors de l’amour et l’amour,"
  - "la même obsession du souci :"
  - "se satisfaire de repasser derrière,"
  - "de reproduire sans la répétition."
