title: "Toujours arriver à être fatiguée"
soustitre: "Mandarine qu’aurait tuée l’opérateur équipé"
lines:
  - "Chine Bulgarie Turquie Thaïlande Göttingen :"
  - "complètement s’épuiser en mode clandestine,"
  - "exacerber l’amoureuse en exagérant l’enjeu,"
  - "y comprendre grand-chose par personne,"
  - "collecter encore un portrait d’histoire."
