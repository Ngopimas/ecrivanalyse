id: 477
title: "Il sera une autre fois"
soustitre: ""
lines:
  - "À s’interdire d’avoir le droit,"
  - "se fermer à livre ouvert,"
  - "s’aimer ne pas déranger, il"
  - "ne se passe. Il donne"
  - "un air d’avoir l’air deux."
