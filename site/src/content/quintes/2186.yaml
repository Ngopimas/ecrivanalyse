title: "Ce qui a du cœur"
soustitre: "Flatterie pour une carence d’énergie"
lines:
  - "Terre inconquise en terrain conquis,"
  - "savoir ce qu’on veut entendre,"
  - "au peu farouche qu’on est,"
  - "à son feu rouge, traverse"
  - "ce qui pousse vers soi !"
