title: "Pas tirée par les cheveux"
soustitre: "Neuve joyeuse quinte d’ans durée"
lines:
  - "Attendre celui qui nous attend,"
  - "cela suffirait-il à faire grandir ?"
  - "Notre cinéma de fin d’études,"
  - "mégalomane ? ne vaut-il pas de"
  - "nous chercher d’une autre sorte ?"
