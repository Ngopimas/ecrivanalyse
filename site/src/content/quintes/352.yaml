id: 352
title: "L’âme avec qui je vis"
soustitre: ""
lines:
  - "L’autre se désabuse comme l’autre,"
  - "qu’il trace un texte juste"
  - "ou juste un graffiti : on"
  - "garde le même chez soi,"
  - "même réfléchi, même en dans-la-loi."
