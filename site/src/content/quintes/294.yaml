id: 294
title: "À la pointe d’une psyché"
soustitre: "Grandeur nature au pied levé"
lines:
  - "À la perspective d’un rapprochement,"
  - "l’extrémité de geste de doigt,"
  - "à la cambrure de boudeuse,"
  - "se montre distante au rétractile,"
  - "à la ligne infinissable muselée."
