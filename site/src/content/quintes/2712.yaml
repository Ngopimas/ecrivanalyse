id: 2712
title: "Où l’on va en venir"
soustitre: "Extraversion à l’approche du propice"
lines:
  - "Rencontrant avec qui l’on travaille,"
  - "l’inconnu que l’on amène ici,"
  - "étant le peu qui importe,"
  - "ayant du bien à faire :"
  - "on est un peu pareil."
