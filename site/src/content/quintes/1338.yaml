title: "Au fond du puits sans"
soustitre: "Culottée en crème de littérature"
lines:
  - "En concours noir et blanc,"
  - "baignée hors de la bagarre,"
  - "se confronter à son objectif,"
  - "aller voir jusqu’où l’on peut :"
  - "chercher à se choquer l’illusion."
