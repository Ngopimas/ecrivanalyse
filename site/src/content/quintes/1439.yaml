title: "En lien avec la rupture"
soustitre: "Sasse de dédépression d’intérêt commun"
lines:
  - "Pourquoi serait-on triste d’être poussé"
  - "vers la sortie lorsque l’intériorité"
  - "avise l’approche de la rentrée ?"
  - "Se faire larguer ? Les amarres !"
  - "La meilleure clef ? La serrure !"
