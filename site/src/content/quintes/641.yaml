title: "Ne pas se coûter cher"
soustitre: "Trafic fluide sur son histoire"
lines:
  - "Savoir encore où l’on habite,"
  - "sans se cogner en papillon,"
  - "postule de dompter le paradis :"
  - "par petits paquets de jungle,"
  - "se faire une empreinte d’emprunt."
