title: "Ce qui va bien finir"
soustitre: "Codée à queue de fils-amants"
lines:
  - "Métal fait exprès en furtive,"
  - "avec l’envie d’en faire partie,"
  - "être l’histoire de sa narratrice,"
  - "jolie en paréidolie restant polie,"
  - "malaisante montant sur ses spots…"
