title: "Flagrance du mur du don"
soustitre: ""
lines:
  - "Après s’être pourtant désécharpée belle"
  - "au point d’éclipser toute solarité,"
  - "la heurtera l’ôtage d’autres lunettes"
  - "jusqu’à s’en retourner, la veste"
  - "- sans relâcher la bride - abattue."
