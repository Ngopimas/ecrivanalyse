id: 3067
title: "À ce sain de soin"
soustitre: "Îlienne en bleu de réhabilitation"
lines:
  - "Abordant nouvellement ce qui s’aborde,"
  - "ne pas être plus qu’authentique !"
  - "à mi-temps de l’ami temps…"
  - "à bonheur de bonne mer :"
  - "ne pleurer que d’un œil."
