id: 1549
title: "En vie de le dire"
soustitre: "Saisissement de ce qui échappe"
lines:
  - "Ton de voie plus grave,"
  - "dans le besoin du temps,"
  - "se scanner à cœur ouvert…"
  - "personne ne l’a tant attendu…"
  - "se donner l’avant-goût du bonheur…"
