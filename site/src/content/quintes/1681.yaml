title: "Bien-naître à côté de ça"
soustitre: "Goûts saisissants de son odeur"
lines:
  - "À la croisée des jumelles,"
  - "telle l’inquiétude à la plage,"
  - "se désintoxiquer en vue vitale :"
  - "avec des bosses en mariée-femme,"
  - "convertir suffisamment de son âge !"
