id: 2321
title: "Le su sûr de soi"
soustitre: "Misée au point de réflexion"
lines:
  - "Sans grimace et sans grimage,"
  - "faisant part belle du naturel,"
  - "patronne des choses à dire,"
  - "à la sauce qu’on préfère :"
  - "se faire aller plus loin."
