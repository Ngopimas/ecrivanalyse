id: 1503
title: "Mise d’eau en les vers"
soustitre: "Manga à la citoyenne caraïbe"
lines:
  - "En bas sur ses collants,"
  - "ce qui la rend anxieuse,"
  - "très réservée du vrai corps"
  - "… Vouloir bien faire les choses"
  - "… Comme une langue paternelle décousue…"
