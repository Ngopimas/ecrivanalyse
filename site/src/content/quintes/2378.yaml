title: "De là où l’on vient"
soustitre: "Cosmique citée à se réapparaître"
lines:
  - "De France et d’ailleurs d’Italie !"
  - "se mettant blanche sur blanc,"
  - "en femme qui se ressemble,"
  - "se faisant une bonne peur,"
  - "se permettre de se vivre !"
