title: "La blondeur à la lèvre"
soustitre: "Entr’invitation dans l’inconfort du juste-milieu"
lines:
  - "Ne pas se laisser passer,"
  - "s’obliger à parler de soi :"
  - "pour être libre de sagesse,"
  - "pour aller jusqu’où ça voit,"
  - "se faire des idées imprécises."
