id: 668
title: "Avoir à faire avec l’être"
soustitre: "Sympathie pour les clefs cérébrales"
lines:
  - "Les mains derrière le dos,"
  - "prendre texte d’être sur soi,"
  - "à s’observer à aimer l’être,"
  - "advenant d’être sûr de soi,"
  - "à s’en dilater les pupilles !"
