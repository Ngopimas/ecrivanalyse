id: 2113
title: "Ce que l’on est plus"
soustitre: "Mimée au clair de peau"
lines:
  - "S’étant remboursée à s’être dégagée,"
  - "pouvant davantage à être écoutée,"
  - "s’approuvant à n’être tacite urne,"
  - "fragrante en rouge à lèvres…"
  - "n’avoir pas volé d’être née."
