id: 397
title: "Le mâle du cul-de-sac travaille"
soustitre: "Papotage encore plus que réel"
lines:
  - "Avoir certaine désexpérience, en air"
  - "de marabout tabou qui fluctuât"
  - "en écriture, quand s’en fiche"
  - "du poste, gai sonna, sérennise"
  - "une façon d’être presque complet."
