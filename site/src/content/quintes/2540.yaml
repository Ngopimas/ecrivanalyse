id: 2540
title: "Ce qui doit se passer"
soustitre: "Agréable se reconnaissant en l’aimant"
lines:
  - "Cheminementée d’excès beaucoup très extrêmes"
  - "vers sa réalisation de personnalité,"
  - "se confier, en cour rageante,"
  - "ce qu’on se fait vivre…"
  - "en essai de calmer ça."
