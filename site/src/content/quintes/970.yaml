id: 970
title: "Le diurne à ce moment-là"
soustitre: "Lugubrité mentale à l’embelle impermanente"
lines:
  - "Au sacrifice de la vie,"
  - "ce qui se rendra unique,"
  - "ne s’arrêtera à la mutilation"
  - "car, trop orgueilleux pour l’être"
  - "… ne pourra jamais se reconnaître…"
