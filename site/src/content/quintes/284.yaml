id: 284
title: "Un pardon sans aucune excuse"
soustitre: ""
lines:
  - "Pièce manquante inscrite en puzzle,"
  - "en maintenant, en vie, à"
  - "l’image d’un coup de foudre,"
  - "le rituel de la tresse,"
  - "cordon rassurant d’un surprenant repaire,"
  - "sidérante cohérence préméditée de l’échappée,"
  - "vous tombe dessus sans maudire"
  - "le plus fort que soi."
