id: 1082
title: "Fait à ne rien faire"
soustitre: "Trait chevalin pour mitoyenne accroupie"
lines:
  - "Le mot est en nourrice,"
  - "bébé qui ne marche pas"
  - "se remettant sur le tapis."
  - "Sa fille – adorant sa mère –"
  - "fait se rencontrer ses parents…"
