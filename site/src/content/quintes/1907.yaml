id: 1907
title: "À qui l’on se lit"
soustitre: "Rivée de vers rayés blanc"
lines:
  - "Témoignant n’avoir pas été trompée,"
  - "se prévenir d’aller voir ailleurs,"
  - "avec qui continuer à grandir,"
  - "étant inter-prête à ses valeurs"
  - "… En synopsis de sa vie…"
