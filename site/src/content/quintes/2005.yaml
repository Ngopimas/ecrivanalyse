title: "Ce qu’on se fait payer"
soustitre: "Loyal au conflit de loyauté"
lines:
  - "Concevant l’importance du moment opportun,"
  - "briguant s’inéligibiliser aux vils brigands,"
  - "gardien se demandant d’y réfléchir,"
  - "aimer se dépasser pour pingre :"
  - "se crever comme un abcès."
