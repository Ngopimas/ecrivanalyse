id: 364
title: "N’avoir ni queue ni tête"
soustitre: "Horreur du pas trop moche"
lines:
  - "Se prendre pour grand-père paternel,"
  - "au fraternel gueulant, à l’accroche"
  - "des espérées, regarde, mise en"
  - "timidité sous condition confiancement que"
  - "faire un foyer au dehors."
