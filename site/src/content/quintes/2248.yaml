id: 2248
title: "À qui l’on se fie"
soustitre: "Inéditée en présence de peur"
lines:
  - "En vivant tout en pleurant,"
  - "l’avis qui se ferait changer,"
  - "celle qu’on a envie d’être,"
  - "s’avérer prête à le faire :"
  - "à ne pas être nocive !"
