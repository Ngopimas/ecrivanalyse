id: 2457
title: "Ce qui sème en vie"
soustitre: "Fêtal en vieux en herbe"
lines:
  - "Avoir un lopin de taire,"
  - "ouïr le silence à l’étoile –"
  - "des paysages de plus beau ?"
  - "et aux yeux de l’extraordinaire"
  - "… se poser en écologie artistique."
