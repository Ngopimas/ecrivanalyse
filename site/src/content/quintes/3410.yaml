title: "À l’air de déjà lu"
soustitre: "Ô dieux visuels à l’Hermès"
lines:
  - "Après des matraques d’années numériques,"
  - "c’est l’imminent s’éliminant en couleurs,"
  - "d’un isolement social sans isolation,"
  - "en une fraternité d’enfant unique"
  - "… en forme de bonne forme !"
