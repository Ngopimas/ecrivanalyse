id: 1416
title: "Ce qui parle de soi"
soustitre: "Chouette rigolote se trouvant l’indice"
lines:
  - "Si ç’avait été une femme,"
  - "s’aidant à faire son travail,"
  - "sans l’envie de se tromper…"
  - "elle se serait appelée Durant…"
  - "qui s’imagine à l’origine Diesel…"
