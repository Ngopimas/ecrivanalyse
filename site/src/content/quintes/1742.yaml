title: "Qui est à la source"
soustitre: "Reconduite à la grande semaine"
lines:
  - "Qui ne s’apporte pas tout,"
  - "est l’heureux de sa tristesse,"
  - "au copilotage de sa direction –"
  - "serrure pour ouvrir une porte-clef,"
  - "en paradoxalité de son autosabotage…"
