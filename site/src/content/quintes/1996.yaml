id: 1996
title: "Ce à quoi ça tient"
soustitre: "Nappe d’infra-fumée vidant son ressac"
lines:
  - "À se préparer au présent,"
  - "à l’endroit de son intimité,"
  - "avec beaucoup de sa frilosité,"
  - "et se permettant d’être banale,"
  - "pouvoir être une prochaine fois."
