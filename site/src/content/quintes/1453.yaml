id: 1453
title: "Job qui fait le travail"
soustitre: "Épuisement d’une beauté de vivre"
lines:
  - "À mesure de ses mots,"
  - "ce qui s’écrit en parlant,"
  - "ça vient pour revenir dessus,"
  - "en locomotion du droit d’auteur,"
  - "cette stabilité de ses bouleversements…"
