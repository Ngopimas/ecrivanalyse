id: 2301
title: "On va dans le mûr"
soustitre: "Tricotée en fondée des doutes"
lines:
  - "Ensemble autour d’une couverture douce,"
  - "ne s’électrochoquer comme une autre,"
  - "comprenant ce qu’on peut faire…"
  - "rythmée en son triple couple,"
  - "en son point de bascule."
