id: 1806
title: "À ce que l’on est"
soustitre: "Dandy né sans un homonyme"
lines:
  - "Ne se perdre de vie,"
  - "sachant où l’on ne va…"
  - "intégrer le ballet des solistes,"
  - "se soumettant à son appréciation…"
  - "s’épanouir à son patrimoine effervescent…"
