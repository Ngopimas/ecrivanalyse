id: 1561
title: "Se mettre à son essai"
soustitre: "Unicité assez simple d’une rencontre"
lines:
  - "À résider où l’on rayonne,"
  - "en forme de puissant fond,"
  - "faire corps avec son cerveau :"
  - "se libérant de sa séquestration,"
  - "pouvoir s’ouvrir les yeux fermés…"
