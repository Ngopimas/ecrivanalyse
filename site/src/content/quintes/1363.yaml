id: 1363
title: "Les gens qu’il y a"
soustitre: "Habit journaliste s’enlevant sans forcer"
lines:
  - "Pas étrangère à sa langue,"
  - "à la lumière d’un artificiel,"
  - "se désharceler en cours d’art…"
  - "vouloir sans vouloir s’en vouloir,"
  - "s’allumer suffisamment pour le faire."
