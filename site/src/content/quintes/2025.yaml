id: 2025
title: "Ce qui vient de soi"
soustitre: "Torse nuitamment grisé des nues"
lines:
  - "Celle qui ne perd fils,"
  - "qui ne craint le cheveu,"
  - "a régné sur ses attachances"
  - "mais, moire aussi des souvenirs"
  - "… en abandonnée en corps intense…"
