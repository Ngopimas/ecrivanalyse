id: 2941
title: "À ce que l’on veut"
soustitre: "Machinée comme bon se semble"
lines:
  - "Au droit de se taire,"
  - "au vide que ça crée,"
  - "être ce qui se nourrit :"
  - "qui ne s’en étoffera pas,"
  - "et ne s’en laissera étouffer."
