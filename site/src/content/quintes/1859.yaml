id: 1859
title: "Du bien à dire oui"
soustitre: "Kaléidoscopée qui s’aide à céder"
lines:
  - "Mur qu’on n’a pas fait,"
  - "en couleurs de sa pensée,"
  - "se déranger en bonne élève,"
  - "à prendre la tangente parallèle,"
  - "seconde peau d’après-coup de soleil."
