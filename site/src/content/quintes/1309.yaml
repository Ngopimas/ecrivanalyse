id: 1309
title: "La peur de la peur"
soustitre: "Notes d’étonnantes connotations en parallèle"
lines:
  - "En retour de la Bourdieusienne,"
  - "se rassurant en montant l’escalier,"
  - "elle légitime l’illégitimité d’une île,"
  - "enfermant le travail d’ouverture d’esprit,"
  - "faisant œuvre d’urbanité honnêtement mutuelle."
