title: "Quand on pleure de soi"
soustitre: "Enfant divorcé d’une rencontre avortée"
lines:
  - "Ce qui vient de rien,"
  - "en moule-terreur de la vie,"
  - "n’est-ce faux qu’on n’y aille ?"
  - "en fait-il l’heureux plus imbécile ?"
  - "n’arrive-t-il bien physiquement à rêver ?"
