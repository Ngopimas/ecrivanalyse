title: "À la dérive des contenants"
soustitre: "Baby bollywooder sans portable fixe"
lines:
  - "Parcours de la certitude tributaire :"
  - "plus dure devient la butte"
  - "où l’avaler n’asservit à rien,"
  - "la décline, en tout genre,"
  - "rend la ville un hôtel."
