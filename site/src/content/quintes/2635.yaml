title: "Où son âge a lieu"
soustitre: "Verbe revenant à son corps"
lines:
  - "Très contente de son non,"
  - "qui n’est jamais toute seule –"
  - "à se régénérer d’autres existences,"
  - "s’excellerrant entre charivari et shibari,"
  - "s’accepter dans l’ouverture aux fermetures."
