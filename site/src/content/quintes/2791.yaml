title: "Ce que l’on a signé"
soustitre: "Vive confiance regagnée en dérougie"
lines:
  - "Au moment donné pour tout,"
  - "ce qu’on doit aller chercher,"
  - "c’est se pousser à exister,"
  - "tel ce qu’on est sensée,"
  - "ce que l’on s’en veut."
