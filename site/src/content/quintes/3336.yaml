id: 3336
title: "À où on est libre"
soustitre: "Plaisancé pour n’y être obligé"
lines:
  - "De façon à se réchauffer,"
  - "au plus noble des voiles,"
  - "en sa façon de travailler,"
  - "remonter le Nil en rêve :"
  - "sans bruit en sa parole."
