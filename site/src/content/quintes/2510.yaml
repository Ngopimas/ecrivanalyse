title: "Ce que l’on a eu"
soustitre: "Libertée figée par un pressentiment"
lines:
  - "À l’organisation de sa perturbation,"
  - "en conséquente de sa poussière,"
  - "dans l’objectif de son hasard,"
  - "se révéler en traces relevées"
  - "… qui est faite pour soi ?"
