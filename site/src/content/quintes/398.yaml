id: 398
title: "Une étrangeté qui la définira"
soustitre: ""
lines:
  - "Chanteuse de coutures aux farfelus,"
  - "aux originaux bleus ongle, indulines"
  - "pas catastrophées quittées de l’enfance,"
  - "surdouée en tourmente peu amour,"
  - "qui se reconnaît d’être azurante."
