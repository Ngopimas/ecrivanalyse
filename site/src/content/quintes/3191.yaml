id: 3191
title: "À côté de ce seul"
soustitre: "Finisseur qu’on garde pour soi"
lines:
  - "Allant travailler où l’on habite :"
  - "aller se fatiguer la fatigue ?"
  - "se plaire à son kung-fu –"
  - "et plutôt tout le temps !"
  - "qui fait tenir le coup…"
