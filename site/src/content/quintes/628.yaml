title: "Sa vie à la loupe"
soustitre: ""
lines:
  - "Avoir envie qu’on se voie,"
  - "qu’on réussisse à se faire"
  - "du bien, à rencontrer des"
  - "gens, qu’on se trouve un"
  - "rôle : de n’être pas fatigué."
