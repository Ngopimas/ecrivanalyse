lines:
  - "Thèse taiseuse en transe-mission non-imposée,"
  - "entrelacs d’entre-là en charitage panachardi,"
  - "tel l’anticorps délite en l’ire-religieuse,"
  - "ne se griller son suranniversaire,"
  - "faire aussi bien que soi !"
