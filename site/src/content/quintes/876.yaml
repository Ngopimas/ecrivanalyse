title: "Se dire à se plaire"
soustitre: "Visible aux boulets de jonglage"
lines:
  - "Façon de passer la vie,"
  - "de se rendre la poussière,"
  - "essai d’effréner ce petit vite,"
  - "d’églinguer de ce prime abord :"
  - "se lire en énormément bénigne !"
