id: 299
title: "Ce qui exacerbe d’être belle"
soustitre: ""
lines:
  - "Tombée dans l’oreille d’un aveugle"
  - "et montée d’adrénaline, la vulnérable"
  - "se raccroche à sa scrutation :"
  - "son impalpable crinière fournit l’instant"
  - "infade, débanal, d’attrait assez inutilisé."
