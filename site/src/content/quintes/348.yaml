id: 348
title: "Encore capable de le faire"
soustitre: ""
lines:
  - "Vies, âges et des visages :"
  - "leur grâce ne peut faner ;"
  - "elle attire toujours le butin,"
  - "l’éternel effet mère, la sororité"
  - "des réjouissances des vingt-cinq ans."
