title: "Coup de pied au cul"
soustitre: "Découplé de pair en fille"
lines:
  - "En un pic d’égalité folle,"
  - "un excès qui se manque,"
  - "un non qu’on veut dire,"
  - "un bon bol de courage,"
  - "faire ce qu’on ne sait !"
