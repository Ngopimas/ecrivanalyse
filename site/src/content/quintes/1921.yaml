id: 1921
title: "En mise à son prix"
soustitre: "Faite autour de son monde"
lines:
  - "À la hâte de l’après,"
  - "en carpe se rêvant lapin –"
  - "où prince cesse d’être pomme !"
  - "avec un épilogue en préliminaires :"
  - "s’investir en retour sur consommation."
