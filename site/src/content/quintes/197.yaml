id: 197
title: "Tu penses comme les on-dit"
soustitre: ""
lines:
  - "Les voyages performent la tristesse,"
  - "permettent de fraterniser avec l’ennui,"
  - "déplacent avec eux le problème"
  - "d’une révolte face au sauve-qui-peut :"
  - "confiance en fuite en soi."
