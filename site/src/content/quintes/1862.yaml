title: "Se jeter à l’eau claire"
soustitre: "Chevalier de la pression familiale"
lines:
  - "Armé de l’air d’y officier,"
  - "avec son cran de médiocrité…"
  - "l’écrit ne s’écrivant pas soi-même,"
  - "venir s’y interroger l’édification et…"
  - "y improviser sa stratégie d’évitement…"
