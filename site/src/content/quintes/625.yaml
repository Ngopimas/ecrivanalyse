id: 625
title: "Où se trouver assez palpable"
soustitre: ""
lines:
  - "De la part de l’improvisation,"
  - "sur le chant, part brute,"
  - "la part tenue du partenaire"
  - "qui part dans une direction,"
  - "se contacter à part entière."
