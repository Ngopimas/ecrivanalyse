title: "Là où l’on s’y sent"
soustitre: "Contemplation de tout son espace"
lines:
  - "Bon vent sur les siens,"
  - "ceux dont on n’a honte,"
  - "sur le chemin qu’on trace,"
  - "qui des voiles qui pavanent…"
  - "les célébrer sans leur empêtrement."
