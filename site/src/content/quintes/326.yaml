id: 326
title: "Le travail de l’état sauvage"
soustitre: ""
lines:
  - "L’image du maximum ne donne"
  - "bonne conscience qu’à l’ordinaire ; embue"
  - "de se greffer aux racines,"
  - "frange vérifiable, n’allèche même pas"
  - "les mœurs ; ni n’y prélude."
