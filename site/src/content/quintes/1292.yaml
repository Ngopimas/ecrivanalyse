title: "Suis ce que je suis"
soustitre: "Résonance par détermination au carré"
lines:
  - "Quand on ne s’aime pas,"
  - "pour se servir à s’éclairer,"
  - "semblant savoir où l’on va,"
  - "il suffit d’un regard insuffisant :"
  - "battant cocassement le sentier d’expression…"
