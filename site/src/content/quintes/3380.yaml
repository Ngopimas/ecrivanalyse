soustitre: "Prodromatique au préavis pas dramatique"
lines:
  - "En grognon pondéré de ronchon…"
  - "aux finances un peu guindées –"
  - "empruntées de ce qu’on doit !"
  - "passer un marché de Noël ?"
  - "où s’être payé en différend."
