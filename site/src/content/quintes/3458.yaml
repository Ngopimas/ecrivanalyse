title: "À l’aide et à l’Aïd"
soustitre: "Visibilisante du soutien de l’imprévisible"
lines:
  - "Humour très musclé de gandoura,"
  - "aux différents degrés de famille ?"
  - "partagée entre partager ou pas,"
  - "se vivre en libératrice d’esprit,"
  - "en culture que l’on cultive…"
