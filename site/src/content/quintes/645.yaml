title: "Le dos dans la tape"
soustitre: "Lever de voile sur aile"
lines:
  - "N’avoir pas froid aux lèvres,"
  - "faire mieux que se taire,"
  - "quand la corvée est d’or,"
  - "ne marque que de tendresse,"
  - "ne coûte que la générosité."
