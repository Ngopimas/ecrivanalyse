id: 301
title: "Rétivité à la bretelle avachie"
soustitre: "Esquisse d’une ébauche de prouesse"
lines:
  - "Trépidante hésitation, audace de timidité,"
  - "la griffure d’escompter être utile,"
  - "dans un ailleurs comme chez"
  - "soi, se livre en peinture"
  - "avec le bord des moyens."
