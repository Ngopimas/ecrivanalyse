id: 1715
title: "Faire ce qui se plaît"
soustitre: "Utile au jugement de beauté"
lines:
  - "Albatros s’aidant à son désempêtrement…"
  - "prendre l’initiative de sa soumission,"
  - "en bifurqué du bavard introverti,"
  - "en écoutant davantage sa mer,"
  - "s’offrir une vie bien dérangée."
