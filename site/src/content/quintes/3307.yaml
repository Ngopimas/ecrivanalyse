id: 3307
title: "À un oui pas prêt"
soustitre: "Traçabilisé en un moment personnel"
lines:
  - "À l’éparpillement d’une oisiveté millimétrée…"
  - "temps compté conté comptant content !"
  - "à la météorologique sans capuche,"
  - "à l’urgentisme à être heureux…"
  - "se chercher en son bonheur."
