id: 1356
title: "Ce qui ne se maîtrise"
soustitre: "Éjaculat n’étant pas tant triste"
lines:
  - "Ce qui n’avorte de soi,"
  - "même en trou de taupe,"
  - "son projet de la fécondité,"
  - "cela en est le consubstantiel…"
  - "mûr pour une présence simplement…"
