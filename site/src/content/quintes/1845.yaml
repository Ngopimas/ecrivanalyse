id: 1845
title: "En maux à elles d’eux"
soustitre: "Gaine non-identifiée qui est importable"
lines:
  - "Paris de femmes à paris,"
  - "tapant sur qui tape dessus,"
  - "héroïnes en chant de bataille,"
  - "s’englober à découvrir le compte :"
  - "y bienveiller sans restriction intrinsèque…"
