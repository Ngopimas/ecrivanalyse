title: "Ne pas ne pas faire"
soustitre: ""
lines:
  - "Par la frangine d’enfance hémorrageante,"
  - "puis débâclage d’un autre personnage"
  - "- la tiédeur n’étant jamais bonne -,"
  - "le vrai talent se postjuge"
  - "à la hauteur de l’inondation."
