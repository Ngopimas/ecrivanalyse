title: "Inspirer que l’on vous espère"
soustitre: ""
lines:
  - "Légende d’aujourd’hui difficile à comprendre :"
  - "aborder les gens d’écoute, au"
  - "détriment du profit, sans être"
  - "qui ils savent, hasarder son"
  - "destin rend normal d’être humain."
