id: 2059
title: "Le temps et le choix"
soustitre: "Tenue qui se porte elle-même"
lines:
  - "À l’échappée de sa vie,"
  - "à l’abri de ses conneries,"
  - "ne pas être sans protection"
  - "– quand on pensait être stérile,"
  - "étant l’autre personne qu’on devient…"
