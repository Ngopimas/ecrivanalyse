id: 2471
title: "Ce qui se laisse faire"
soustitre: "Délicate en forme de pouvoir"
lines:
  - "Seule à bord de plume,"
  - "en belle qui se travaille,"
  - "en n’évitant de se vivre…"
  - "en s’inspirant de sa confiance,"
  - "s’aventurer à sa danse cinématograve !"
