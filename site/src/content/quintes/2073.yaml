id: 2073
title: "Ça se fait de soi"
soustitre: "Considération de son temps d’apprivoisement"
lines:
  - "En être humain de plus,"
  - "se vivre dans l’autre sens,"
  - "se laisser regarder les yeux,"
  - "se désabuser de sa désillusion"
  - "… préserver sa liberté de partir."
