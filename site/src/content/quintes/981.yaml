id: 981
title: "N’avoir que corps à faire"
soustitre: "Portabilité de la goutte d’eau"
lines:
  - "L’envie d’être plus ou verte,"
  - "désépilant ses poils tout roux,"
  - "bleu-rose sans pierre à gênation,"
  - "l’instauration que ce caca doit :"
  - "de quelle couleur se passe-t-elle ?"
