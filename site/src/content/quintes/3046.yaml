id: 3046
title: "Ça se sort du dit"
soustitre: "Médecine douce s’appliquant à s’appliquer"
lines:
  - "Davantage soucieuse de son insouciance –"
  - "suivant sa hiérarchie plus hospitalière ?"
  - "spontanéité un peu moins calculée,"
  - "se livrer à soi-même délivrée…"
  - "éviter bêtise de n’en faire !"
