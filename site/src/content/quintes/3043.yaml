id: 3043
title: "Où le vide se fit"
soustitre: "Embourgeoisée en salutaire à taire"
lines:
  - "En vierge de son lieu –"
  - "l’ailleurs où l’on est née,"
  - "rendu de coup de poing ?"
  - "cadeau en langue de mère :"
  - "s’alléger le fardeau de l’héritage."
