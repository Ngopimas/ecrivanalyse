id: 1068
title: "On a fait sa vie"
soustitre: "Oiseau-Poisson pour un patient diamant"
lines:
  - "À l’ancre sur son corps,"
  - "un beau portrait de soi :"
  - "l’origine à cœur de peau,"
  - "aux yeux clairs de couleur,"
  - "la jambe lisse jusqu’au crâne."
