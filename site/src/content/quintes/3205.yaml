id: 3205
title: "Ce qu’on a pu être"
soustitre: "Attentive à qui va emmagasiner"
lines:
  - "Allant chercher la confiance immédiate,"
  - "en lumière des mouvements attirants,"
  - "se poser fatalement en silencieuse,"
  - "en modératrice sachant se taire,"
  - "baroque qui n’est une zozo."
