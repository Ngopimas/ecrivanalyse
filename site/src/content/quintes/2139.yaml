title: "Le la de la leçon"
soustitre: "Prête à ne pas l’être"
lines:
  - "Entre les gazouillis et chouignement,"
  - "sachant ce qu’on n’apprend pas,"
  - "prendre sa place de l’antre,"
  - "se garder de le donner :"
  - "en ayant plaint le do."
