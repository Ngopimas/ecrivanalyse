id: 1564
title: "Se lire à travers soi"
soustitre: "Avenant de l’homme à femmes"
lines:
  - "Où l’on veut en venir,"
  - "à monter sur son bateau,"
  - "se rappeler de sa vieillesse :"
  - "siroter son mot relatif viscéral,"
  - "en commandant de bord espiègle !"
