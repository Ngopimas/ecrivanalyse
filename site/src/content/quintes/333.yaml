title: "Ce que l’on a fait"
soustitre: ""
lines:
  - "Vivre le blanc des yeux"
  - "bleus, d’une demi-teinte qu’on a"
  - "sombrée, rougie qu’on a conduite,"
  - "qu’on a, par les jambes,"
  - "narines et dents, inouïes, initiée !"
