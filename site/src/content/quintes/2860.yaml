title: "Se dire où on est"
soustitre: "Dissipée comme pas très attentive"
lines:
  - "Se pousser comme aux champignons,"
  - "en désœuvre comme en art-dèche,"
  - "aux temps comme les météos,"
  - "où l’on ne s’imagine pas,"
  - "y aller en y allant."
