id: 1863
title: "À côté du bar d’à-côté"
soustitre: "Palme d’or de son économie"
lines:
  - "Vouloir être dans le concret,"
  - "en studieux de bonne famille,"
  - "à l’instant d’instinct de raison,"
  - "faille sur laquelle l’on s’appuie,"
  - "pouvoir être sa propre béquille."
