title: "En regard de son verbe"
soustitre: ""
lines:
  - "Un geigneur de l’art infusionnel"
  - "- ingéniteur enfant sur la route -"
  - "procrée la bague filiale épousodique"
  - "- chignonnée entre filles et mères -"
  - "d’une esthétique pas trop nymique."
