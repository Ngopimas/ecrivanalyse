id: 313
title: "Le fantastique trouvère à soi"
soustitre: ""
lines:
  - "La langue d’instinct n’est étrangère"
  - "à personne. Par la grâce"
  - "du dictionnaire des mimes, elle"
  - "parle en vous, en vie,"
  - "de vous changer les yeux."
