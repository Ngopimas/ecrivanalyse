id: 889
title: "Falloir n’être pas trop grand"
soustitre: "Émulsion par transe pas rance"
lines:
  - "Une envie d’aller rester assise :"
  - "boire pour travailler pour boire,"
  - "s’avancer sur l’habitude de vivre,"
  - "ne fliquer que l’amnésie d’enfance,"
  - "s’influencer d’une façon de regarder."
