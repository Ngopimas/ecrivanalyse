id: 3119
title: "Qui se bat un peu"
soustitre: "Coquille gênée mais portant chouette"
lines:
  - "Contrastée entre ses deux intimités,"
  - "se répercutant dans la collectivité,"
  - "à l’identité d’un timide référent !"
  - "se tourner autour le silence,"
  - "où l’on n’a pas peur…"
