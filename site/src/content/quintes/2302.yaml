id: 2302
title: "Ça ne se voit vue"
soustitre: "Impensée à la rigueur courageuse"
lines:
  - "S’affranchissant ici de son passé,"
  - "mettant son maillot de beau !"
  - "entre sa vie comme ailleurs,"
  - "se déshabillant sur la page,"
  - "pouvoir se flatter de l’être."
