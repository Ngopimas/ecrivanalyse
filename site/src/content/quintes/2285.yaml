title: "Voir ce que ça fait"
soustitre: "Décoiffe qui se porte bien"
lines:
  - "Décarapaçonnée de sa peau chaude"
  - "d’une dépose dans le cerveau"
  - "– dans le but de débuter !"
  - "être ce qui se chemine,"
  - "vue… si l’on se plaît."
