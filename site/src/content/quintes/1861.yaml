id: 1861
title: "Se repérer à la vie"
soustitre: "Peint en odeur de café"
lines:
  - "Heureux qui, communard, a fait"
  - "un beau transit où, parmement"
  - "solaire, qui est resté pudique"
  - "à l’intimité de ce partage"
  - "du ouï de son nom."
