id: 1835
title: "Pas seuls à se voir"
soustitre: "Talon d’assise en dit ficelément"
lines:
  - "Au chagrin qui fait sourire,"
  - "à sa ceinture de bleu-safran,"
  - "en périnées qui se traversent,"
  - "en place prépondérante de vivre,"
  - "prendre l’espace d’une matière d’être…"
