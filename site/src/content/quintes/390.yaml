id: 390
title: "Qui n’aurait pas dû répondre"
soustitre: ""
lines:
  - "À une fente asthmeuse prête,"
  - "chose qui s’impose à l’autre,"
  - "ultraviolante en extrémité féminine qui"
  - "se donnerait des nouvelles érotiques,"
  - "lèses synchroniques : ç’aurait été l’été !"
