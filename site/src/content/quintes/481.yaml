title: "Savoir se mettre en cinq"
soustitre: ""
lines:
  - "Celle qui marche en roulant,"
  - "forcée de constater qu’elle frise"
  - "l’exotisme, jongle privilégiée des rapports,"
  - "s’agence blasée au podium : corrobore"
  - "sa meilleure façon de pleurer."
