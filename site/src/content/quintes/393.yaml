title: "Savoir ne se rien préférer"
soustitre: "Plage qui borde la folie"
lines:
  - "Comme une médecine, la gesticule,"
  - "petite-tête que la fée casse,"
  - "irascible qui s’est voulue bile,"
  - "la sûrement pas des familles"
  - "n’insulte que le bon mot-ment."
