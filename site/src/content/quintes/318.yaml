title: "Être là d’être en retard"
soustitre: ""
lines:
  - "Attendu que le père, l’amer,"
  - "d’une mère à mort qu’amor"
  - "y perd en paire sans"
  - "terre, sans taire s’enterre : renvoie"
  - "à l’heure d’une génération spontanée."
