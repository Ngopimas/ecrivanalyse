title: "À ce fort mal sis"
soustitre: "Grenouillages changeant le regard oratoire"
lines:
  - "Base arrière un peu passionnelle,"
  - "en piaule mansardée de libre,"
  - "en ressort de ses douleurs :"
  - "en recul historique sur soi,"
  - "faire la planche du salut !"
