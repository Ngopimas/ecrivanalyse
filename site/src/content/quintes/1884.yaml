title: "Ce qui est à discuter"
soustitre: "Effervescente ne restant sur l’expectative"
lines:
  - "Au-delà de ce qui fige,"
  - "après son bac plus cinq,"
  - "à revenir en petite sueur,"
  - "sur le théâtre de l’enfance :"
  - "elle se fait bien interpréter…"
