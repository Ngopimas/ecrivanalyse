id: 718
title: "Un oui par son nom"
soustitre: "Retrouvailles à la poitrine nue"
lines:
  - "À travers le cadeau d’exister,"
  - "par l’échancrure de sa pudeur,"
  - "regarder ceux qui se piétonnent"
  - "comme un reflet de soi-même :"
  - "en offrande... à se réhabiliter."
