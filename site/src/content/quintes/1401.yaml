title: "La langue de la culture"
soustitre: "Maquillée positive de la curiosité"
lines:
  - "Trouver ses soucis sous vie,"
  - "s’activer à être plus similaire,"
  - "s’ouvrir en parisien de voisins,"
  - "se parler sans mentir : échanger"
  - "en conversation avec sa barrière."
