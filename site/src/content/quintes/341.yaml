id: 341
title: "Ne pas s’attendre à soi"
soustitre: ""
lines:
  - "Le seul sujet en commun,"
  - "pour avoir à le raconter,"
  - "tend des perches au hasard"
  - "s’il peut prouver, inscrite sur"
  - "une carte, son identité rouille."
