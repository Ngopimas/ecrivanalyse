title: "Le grand-chose à faire d’autre"
soustitre: ""
lines:
  - "L’égalitaire magistrature du désir, désagrégée"
  - "d’imbroglio, invalide tout procès d’intention"
  - "- poignant cassage des dents paresseuses -"
  - "rassurant l’arrivée messianique laïque vague"
  - "pour suivre un fictionnaire public."
