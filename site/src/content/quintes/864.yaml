title: "Ce qui pourrait se faire"
soustitre: "Rare et faction de j’en-sais-rienisme"
lines:
  - "Nature prudente concrète sur soi,"
  - "pull hautement fertile en couleur,"
  - "idée d’élite en forme d’acceptation,"
  - "à s’offrir un fantasme d’anniversaire,"
  - "s’impatiente de sa féminité défensive."
