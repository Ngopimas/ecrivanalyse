title: "Ce qui n’est jamais arrivé"
soustitre: "Abstraction du regard de l’autre"
lines:
  - "Dans sa zone de confort,"
  - "se saboter les peurs intimes,"
  - "se laisser approcher pour soi,"
  - "s’attacher à n’avoir pas envie :"
  - "vraiment falloir qu’on fasse face !"
