title: "À l’occasion de sa vie"
soustitre: "Engin fantaisiste pour obsèques microscopiques"
lines:
  - "Vert de vain en main,"
  - "bien voir la nuit noire :"
  - "ayant bien fait d’y aller –"
  - "s’y donner envie de rester…"
  - "en recluse pétillante de fidélité !"
