title: "Faire les pieds au seuil"
soustitre: ""
lines:
  - "Deux voix vouées au vouvoiement,"
  - "qui s’entendent bien, qui coïncident,"
  - "vont, au dévoiement du voyou,"
  - "s’articulant, facilitant, liant leurs liens :"
  - "des voyez-vous en doux youyous !"
