title: "Ce qui se tire d’ici"
soustitre: "Saute-moutonne en reflet de bulle"
lines:
  - "Jardinée s’étant mise en relation,"
  - "et qui s’ingratte qui grisonne"
  - "faisant mieux que sa mère,"
  - "ce qui n’est du gâteau…"
  - "c’est bien ça, le gâteau."
