id: 1793
title: "Pour rien ne se dire"
soustitre: "Métamorphosée en version pas thétique"
lines:
  - "Se jeter sur son dévolu,"
  - "ne mettre pied à l’étriller,"
  - "se ressembler plutôt pas mal,"
  - "ne s’enjoignant pas de profiter…"
  - "s’être bien-aimée revoyant son miroir."
