title: "Un épuisement de la liste"
soustitre: ""
lines:
  - "La sentence sans père s’empare"
  - "sans sursis du sang-froid sans"
  - "souci aussi sûr que si"
  - "sein s’urge, sans trêve s’entrave,"
  - "sans cible, s’enterre sans taire."
