id: 2498
title: "Ce qu’on ne veut tu"
soustitre: "Antianticipée que l’on trouve jolie"
lines:
  - "Bienveillante qu’un bien vieil hante,"
  - "en retranchement que l’on pousse,"
  - "en abandon que l’on orchestre ?"
  - "en verbalisation de ses vides,"
  - "c’est ainsi qu’on s’en tire."
