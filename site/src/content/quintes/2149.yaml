title: "Ce que c’est que ça"
soustitre: "Finée en forme de silence"
lines:
  - "Décidée hors de son aquarium,"
  - "se retrouvant encore en corps !"
  - "solide comme ce qu’on dit…"
  - "en sa drôle de mélancolie :"
  - "se laisser surgir la vie ?"
