id: 821
title: "Une passion pour le faire"
soustitre: "Lâcher capillaire pas forcément insignifiant"
lines:
  - "S’agir de ne pas s’agiter,"
  - "garder le silence de l’aveu,"
  - "se rentrer dans le quotidien,"
  - "rompre le cadre de l’habitude,"
  - "s’ajuster au mystérieux pour soi !"
