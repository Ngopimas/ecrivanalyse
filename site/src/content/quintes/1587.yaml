title: "Au soleil de la lune"
soustitre: "Boule qui se sort d’elle-même"
lines:
  - "Passant du mot à l’armée,"
  - "redonner sa parole au corps."
  - "Inconfort qui n’est guère civil,"
  - "s’auto-stopper de taire le silence…"
  - "partager avec beaucoup de générations !"
