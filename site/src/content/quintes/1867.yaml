id: 1867
title: "Ce qui se fait soi"
soustitre: "Oscillant jaune d’arcane Art plastique"
lines:
  - "S’étant bien modulés pour s’encourager,"
  - "s’étant bien serrés à l’intouchable,"
  - "à l’épongée de l’être pompeux,"
  - "avoir ses cheveux aux yeux :"
  - "s’étant contés à ce temps !"
