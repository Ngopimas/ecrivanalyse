title: "À ce qui se fait"
soustitre: "Verre à pied de nez"
lines:
  - "Astucieuse gentillesse reconnaissant ses forts,"
  - "sauvant sa peau d’échappante belle,"
  - "rendre grâce aux cheveux gras,"
  - "à la dérobée qu’on dégaine :"
  - "se comparer à ce con-paré !"
