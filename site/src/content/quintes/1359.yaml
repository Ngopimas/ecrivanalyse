id: 1359
title: "Se tirer par les cheveux"
soustitre: "Tiède flemmard tout se bouquant"
lines:
  - "À se mettre en retrait"
  - "et, son action, au passif,"
  - "l’on ne pense qu’à compter,"
  - "quantification où l’on ne calcule"
  - "jusqu’à combien l’on pourrait réfléchir."
