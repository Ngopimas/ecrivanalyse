soustitre: "Distinction se distinguant sans diplôme"
lines:
  - "À l’origine de sa rumeur,"
  - "se douchant froid au chaud,"
  - "se dévouant mais sans dévotion,"
  - "progressant mais non sans protection :"
  - "s’excommuniquer de la vile excommunication."
