title: "Être quitte à y être"
soustitre: "Écopé ficelé d’usure mémorielle continente"
lines:
  - "En micro-détail d’une soucoupe volante,"
  - "soubresauter ses feux verts spirituels"
  - "– en dialogue intérieur de sortie,"
  - "ce qu’on priorise à prioritiser,"
  - "en poids comme en taille ?"
