title: "Là où l’on se pose"
soustitre: "Recatégorisée au pompier de divagation"
lines:
  - "Cohérente avec son image physique,"
  - "perdue dans son métier numérique,"
  - "appliquée d’art content pour rien,"
  - "n’être pas la plus répandue…"
  - "quand on est une femme."
