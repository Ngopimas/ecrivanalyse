id: 2346
title: "Ce que l’on ose dire"
soustitre: "Hypnotisation au sud du soleil"
lines:
  - "En compagnie de son devoir,"
  - "en bon moyen d’y échapper,"
  - "bien aimer être toute seule,"
  - "s’y prendre assez de temps,"
  - "avec son tailleur de bière ?"
