id: 3460
title: "À qui suit le fou"
soustitre: "Intrusivité de son pas gratuit"
lines:
  - "En silence qu’on n’expliquera pas,"
  - "travailler sur le corps humain,"
  - "son intime et son collectif,"
  - "qu’on va se faire vivre,"
  - "que l’on va se noter."
