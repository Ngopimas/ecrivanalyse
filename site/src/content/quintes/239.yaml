id: 239
title: "Rien à voir à l’œil"
soustitre: ""
lines:
  - "Fixer modifie qui l’on dévisage,"
  - "le défigure au sens propre,"
  - "désaltère certes notre appel d’autrui"
  - "pourtant, partant, détruit par tant"
  - "d’échange en guise de substitut."
