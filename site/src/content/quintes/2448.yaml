id: 2448
title: "Ce qui ne se manque"
soustitre: "Épithète de turque en recto-verso"
lines:
  - "En fruit de son déracinement,"
  - "en sa langue des épluchures,"
  - "élevée par qui l’on élève…"
  - "n’être sans sucre ni miel,"
  - "ce qu’on fait pour soi !"
