title: "Quand même le sourire bouge"
soustitre: ""
lines:
  - "Quelqu’un dont on ne parle"
  - "- compétitif préposé à la peur :"
  - "être vue dans son comportement -"
  - "désigne la pétillance crédible, la"
  - "confiance à laquelle se fier."
