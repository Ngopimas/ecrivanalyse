id: 347
title: "La lectrice et son clone"
soustitre: ""
lines:
  - "Homomorphique à son histoire, être"
  - "de ce qu’elle fait, naturelle"
  - "d’un degré différent, timidement extrême,"
  - "l’approchée de trop près sent"
  - "qu’elle passe la frontière exotique."
