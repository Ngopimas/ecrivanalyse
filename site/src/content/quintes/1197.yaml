id: 1197
title: "Au tour de la dépense"
soustitre: "Image donnée de bourgeoise mitigée"
lines:
  - "Au milieu de la prière,"
  - "se procurer ce qui suffit,"
  - "loisir de ne pas s’interdire,"
  - "notre pair n’étant notre mère"
  - "… bonheur de ne pas s’épargner."
