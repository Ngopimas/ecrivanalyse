id: 1868
title: "Vie de tous les jours"
soustitre: "Adverbialement partant de son principe"
lines:
  - "Sans se couper le silence,"
  - "un petit regard entre soi,"
  - "comble du temps à perdre,"
  - "se demande à être compris…"
  - "en vérification de sa confidence."
