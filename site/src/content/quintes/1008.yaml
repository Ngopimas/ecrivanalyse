id: 1008
title: "À ne jamais penser faire"
soustitre: "Ronronnement sans trop se lacer"
lines:
  - "Ça se lie à l’écriture,"
  - "fait la grève du vomi :"
  - "du moment qu’on le dit,"
  - "balance entre cuir et vinyle,"
  - "se partage à s’en outrepasser…"
