title: "Ce qui est déjà joli"
soustitre: "Morte de peur d’être morte"
lines:
  - "Consciente d’être incautionnant de l’inconscience,"
  - "faisant montre de son savoir-ne-pas-faire,"
  - "s’incommander en négligé de soi,"
  - "une mauvaise fois de plus !"
  - "tout ce que l’on peut."
