title: "La fraude à la plainte"
soustitre: ""
lines:
  - "Observer une minute de tristesse,"
  - "à l’école de gestion émotionnelle"
  - "et, donc, en temps anormal,"
  - "la livre prodigieuse à elle-même"
  - "et fait craquer ses vertèbres."
