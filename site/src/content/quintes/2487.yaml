title: "Face à face à soi"
soustitre: "Bridé s’ajustant par ses considérants"
lines:
  - "Au plaisir de sa vulnérabilité :"
  - "ni vu d’Ève connue d’Adam,"
  - "séant bien à sa bienséance,"
  - "au niveau de son ventre,"
  - "au bord de ses règles."
