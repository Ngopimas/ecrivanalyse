id: 598
title: "Fluides - Partie II - Chapitre V"
soustitre: ""
lines:
  - "André ne se sentait pas très bien. Il devait couver quelque chose. Cela faisait deux heures qu’il était de retour chez lui et guère davantage que son cours à la fac s’était achevé. De Censier à son petit deux pièces de la rue de la Bûcherie, il n’en avait en effet que pour une petite vingtaine de minutes à pied. C’était peut-être pendant ce trajet qu’il avait attrapé un coup de froid. Quoi qu’il en fût, il savait qu’il n’y avait pas que cela."
  - "Pascal n’était en fait pas très à l’aise. Il éprouvait une désagréable sensation de vide. Pour tout dire, il angoissait. Il avait le trac. Il attendait la visite de son ami Pascal Sosia. Il devait lui faire le compte-rendu de ce premier cours où il venait d’expliquer à ses étudiants le projet commun de ces deux vieux complices qu’étaient Sosia et lui. Seulement voilà, André avait peur. Il redoutait cette entrevue avec son ami. Comme d’habitude, André et Pascal avait rendez-vous chez le professeur. Malgré les sentiments intenses qui les liaient, il n’avait jamais été possible à celui-ci de procéder autrement avec cet énergumène de Sosia. Sosia était bien trop mystérieux, bien trop secret pour avoir jamais accepté de lui ouvrir la porte de son antre. C’était toujours lui qui le visitait..."
  - "Mais là, ce soir, il y avait cette étrange pensée. André avait peur. Il repensa au dernier film avec Will Smith qu’il avait récemment vu. Il se souvint de ces personnages angoissants, mi-fantômes mi-vampires, qui lui avaient paru si noirs ! Il n’attendait pourtant pas un fantôme ! Pascal était seulement son ami ! Alors, pourquoi cette anxiété ?"
