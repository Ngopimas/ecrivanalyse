id: 1876
title: "Le seul à le faire"
soustitre: "Refourgué qui n’est pas transcendantal"
lines:
  - "Ce qui pèse le plus,"
  - "ça se fait comme ça,"
  - "au prix de son temps,"
  - "du dessein à ses règles…"
  - "c’est le stade de l’expérience…"
