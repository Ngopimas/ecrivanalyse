id: 204
title: "La fille sûre du monde"
soustitre: ""
lines:
  - "L’altération de l’aussi flave essence"
  - "qui se figure se gagner"
  - "sans en perdre la face"
  - "se recueille par labile politique"
  - "où s’apeure son épure amassée."
