id: 365
title: "Le vide à moitié plein"
soustitre: "Organisé de gâche en lucre"
lines:
  - "Tourner autour du temps démontre,"
  - "aiguille sur des appétits d’à-côtés,"
  - "aussi que le pas forcément"
  - "d’une envie – imprévue du téléphoné –"
  - "en fasse miroiter la nécessité."
