id: 2000
title: "Ça se met à l’abri"
soustitre: "Mixée en sa bonne formule"
lines:
  - "Ce qui se fait soi-même,"
  - "dans un temps sans folie,"
  - "sans boîte faisant des box,"
  - "sans avoir été lâché léché…"
  - "mitonne en mois à s’arrondir."
