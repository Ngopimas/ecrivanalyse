id: 1903
title: "Ce qu’on sait de soi"
soustitre: "Pure-ceinte à vingt-cinq pour-cent près"
lines:
  - "Ayant presque pu le faire,"
  - "de plus en plus importante,"
  - "évidant ce qui paraît évident,"
  - "partie de l’identité de l’autre :"
  - "commencer peut-être à se dire."
