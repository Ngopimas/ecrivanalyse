title: "Il y avait une mort"
soustitre: "Cauchemarâtre étant sa meilleure amie"
lines:
  - "En fusion où entourage encourage,"
  - "en claque qu’on s’est donnée…"
  - "en partie qu’on se récupère –"
  - "ayant la vision qui change :"
  - "pouvoir rester en vie âgée."
