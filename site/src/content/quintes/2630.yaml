title: "Où l’on est à soi"
soustitre: "Appariée à qui a parié"
lines:
  - "Dispo pour un convenant perso,"
  - "se bricoler ce qu’on bricole"
  - "– ce que l’on se laisse –"
  - "en pas sous la main ?"
  - "ce que l’on se lasse."
