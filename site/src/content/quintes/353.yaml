title: "Ça va mal pour l’autre"
soustitre: ""
lines:
  - "La débordée des yeux, qui"
  - "se distrait de votre voix,"
  - "puis tout à flair glissante,"
  - "passe partout en sa vocation,"
  - "exige du temps quelques mimiques."
