id: 1810
title: "Ce qui se fait rire"
soustitre: "Sauve qui peut cuisiner épicé"
lines:
  - "Les cris que l’on aime,"
  - "serait-ce à hurler à deux ?"
  - "N’avoir vie sans ses facéties ?"
  - "L’heur d’étonner à l’air détonné ?"
  - "Rouspétance d’étrange soupe au beau !"
