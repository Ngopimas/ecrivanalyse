id: 2357
title: "Ce qui n’est trop peu"
soustitre: "Optée triviale en relève d’intérêt"
lines:
  - "Plus loin que du divertissement,"
  - "ressemblante à ce qu’on pense ?"
  - "s’agir de ne faire grand-chose !"
  - "au bénéfice du temps perdu :"
  - "prête au prêt à l’exercice…"
