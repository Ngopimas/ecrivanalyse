title: "Se plaire à la ville"
soustitre: "Interceptée typographique en tentatrice d’expérience"
lines:
  - "Paris d’échange à base bretonne,"
  - "en étalée au passage piétonne,"
  - "qui s’attarde sur ses détails,"
  - "de l’autre côté d’une rue :"
  - "se scruter par sa fenêtre."
