title: "Avoir l’âge d’être son père"
soustitre: ""
lines:
  - "Le savoir de se satisfaire,"
  - "l’intuition de s’en douter de"
  - "quelque chose, l’intelligence de n’y"
  - "plus penser : complexe isolé de"
  - "la passante qui passe ; acéré."
