title: "Être ce qui se réussit"
soustitre: "Parmélie mélo à l’oreille tendue"
lines:
  - "À l’école de la vaisselle,"
  - "se cacher dans la caméra,"
  - "sans mante ni de chausses !"
  - "Paris en milieu de cambrousse,"
  - "se faire entendre ses ruissellements…"
