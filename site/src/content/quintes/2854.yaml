title: "Ce qui est bel vu"
soustitre: "Ambitionnante en sa manière physique"
lines:
  - "Sans le pernicieux des influenceuses,"
  - "en travailleuse parmi les paresseux,"
  - "avec le sérieux d’une facétieuse,"
  - "se couper cheveux en folâtre"
  - ": où l’on a besoin d’être !"
