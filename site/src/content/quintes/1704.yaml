id: 1704
title: "La vie qu’on se paie"
soustitre: "Crapaud à léguer aux escargots"
lines:
  - "À se dire en chut-du-mur,"
  - "avec son enceinte de prison…"
  - "répondant à une invitation banaliste"
  - "– montrant du doigt l’officiel point-virgule :"
  - "conférencer sur l’héritage d’hommes-pipi marionnettistes."
