title: "Avoir des enfants de film"
soustitre: "La vie sauve du dépassement"
lines:
  - "Untel écarte tellement, futur opiacé,"
  - "prise de perte, logistique constructive,"
  - "que s’en avoue délimitée l’incohérence,"
  - "éparpillée l’impression, court-circuitée l’invisible invincible :"
  - "esthésie émancipatrice du bouc émissaire."
