title: "Le prochain de ses décès"
soustitre: "Krav-maga proportionné à son sarcasme"
lines:
  - "La semaine de sa nuit,"
  - "se faire la bonne raison,"
  - "la preuve de sa lucidité :"
  - "rien tout contre la famille,"
  - "s’être saisi de s’être démangé."
