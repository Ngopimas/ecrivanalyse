id: 246
title: "Poser le pied d’une mise"
soustitre: "Des nuits auraient adoré passer"
lines:
  - "Sans issue, lasse, sangsue, elle"
  - "exige, exiguë en l’exsangue usuel,"
  - "son privilège - possible mais inimaginable -"
  - "d’être bien - quelqu’un qu’elle hait ? - :"
  - "fiable de se montrer faible !"
