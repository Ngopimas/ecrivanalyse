<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Écrivanalyse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Instrument+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E7; --ink:#17130F; --muted:#6B635A; --ochre:#B0472C; --hair:#E2DACA;
    --serif:"Fraunces",Georgia,serif; --sans:"Instrument Sans",system-ui,sans-serif; --mono:"JetBrains Mono",monospace;
  }
  body.dark{--paper:#1E1A16;--ink:#EDE6D8;--muted:#A79E90;--ochre:#CE7659;--hair:#38322B}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
    transition:background .5s,color .5s;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100vh}
  a{color:inherit}
  header{display:flex;justify-content:space-between;align-items:center;
    padding:clamp(20px,4vw,34px) clamp(20px,5vw,52px)}
  .brand{font-family:var(--serif);font-size:20px;letter-spacing:.02em}
  nav{display:flex;gap:clamp(14px,2.4vw,26px);align-items:center;font-size:13.5px;color:var(--muted)}
  nav a{text-decoration:none;cursor:pointer}
  nav a:hover{color:var(--ochre)}
  .iconbtn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;font-family:var(--sans)}
  .iconbtn:hover{color:var(--ochre)}

  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 clamp(20px,6vw,40px);gap:6px}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:clamp(12px,3vw,22px)}
  .flourish{width:150px;height:auto;color:var(--ochre);margin-bottom:6px;opacity:.9}
  .flourish path{fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;
    stroke-dasharray:1;stroke-dashoffset:1;pathLength:1}
  .run .flourish path{animation:draw 1.1s ease-out forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .title{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--muted);
    font-size:clamp(15px,2vw,18px);margin-bottom:clamp(18px,4vw,34px)}
  .poem{font-family:var(--serif);font-style:italic;font-weight:300;
    font-size:clamp(23px,3.8vw,37px);line-height:1.6;letter-spacing:-.01em;max-width:22ch}
  .poem .ln{display:block;clip-path:inset(0 100% 0 0);opacity:.14}
  .run .poem .ln{animation:ink .8s cubic-bezier(.4,.1,.2,1) forwards}
  .run .poem .ln:nth-child(1){animation-delay:.5s}
  .run .poem .ln:nth-child(2){animation-delay:1.25s}
  .run .poem .ln:nth-child(3){animation-delay:2s}
  .run .poem .ln:nth-child(4){animation-delay:2.75s}
  .run .poem .ln:nth-child(5){animation-delay:3.5s}
  @keyframes ink{from{clip-path:inset(0 100% 0 0);opacity:.14}to{clip-path:inset(0 0 0 0);opacity:1}}
  .meta{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.9;
    margin-top:clamp(26px,5vw,46px);opacity:0}
  .run .meta{animation:fade .8s ease-out 4.3s forwards}
  @keyframes fade{to{opacity:1}}
  .meta .oe{color:var(--ochre)}

  footer{display:flex;flex-direction:column;align-items:center;gap:14px;
    padding:0 20px clamp(28px,6vw,54px)}
  .rand{font-family:var(--mono);font-size:13px;color:var(--ochre);background:none;
    border:1px solid var(--ochre);border-radius:999px;padding:10px 20px;cursor:pointer;
    letter-spacing:.02em;transition:background .2s,color .2s}
  .rand:hover{background:var(--ochre);color:var(--paper)}
  .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--hair)}

  @media (prefers-reduced-motion: reduce){
    .poem .ln{clip-path:none!important;opacity:1!important;animation:none!important}
    .flourish path{stroke-dashoffset:0!important;animation:none!important}
    .meta{opacity:1!important;animation:none!important}
  }
</style>
</head>
<body class="run" id="page">
  <header>
    <span class="brand">Écrivanalyse</span>
    <nav>
      <a>L'archive</a><a>Les collections</a><a>Le projet</a>
      <button class="iconbtn" onclick="document.body.classList.toggle('dark')" title="Jour / Nuit">☾</button>
    </nav>
  </header>

  <main>
    <div class="kicker">une quintesse · cinq lignes de cinq mots</div>
    <svg class="flourish" viewBox="0 0 200 56" aria-hidden="true"><path d="M4 38 C 40 6, 72 8, 84 30 S 122 56, 150 28 C 168 10, 190 16, 196 32"/></svg>
    <div class="title" id="title"></div>
    <div class="poem" id="poem"></div>
    <div class="meta" id="meta"></div>
  </main>

  <footer>
    <button class="rand" onclick="draw()">rencontre au hasard&nbsp; ↻</button>
    <span class="tag">écrivanalyse d'Ivan Joseph · 2006 — 2026</span>
  </footer>

<script>
  var POEMS = [
    {title:"Le je à ce feu", lines:["À se détacher d'être attachante,","à dépendre de son dépendre,","à s'agir d'être vue assagie,","à se nommer à point…","se lover où l'on sème…"],
     anal:"anonyme · Quintesse XIX", coll:"En pas pas en couple", date:"12 novembre 2019"},
    {title:"À très peu de pli", lines:["Moindre goutte qui se droguerait,","s'endormir à l'hôtel des défunts,","inquiète de quitter sa quiétude,","se versante parmi ses massifs","… Être le sujet qui s'échappe."],
     anal:"anonyme · Quintesse XVIII", coll:"À la légère de ça", date:"2 juillet 2026"},
    {title:"Le petit non d'une fille", lines:["À la place du marié,","mécompte qui barre les jours,","s'exécute le clash tanné d'étonnant","qu'insoufflèrent des idées et d'odieuses,","chagrines d'amour, comme d'un excès."],
     anal:"Annick Lebédyk · Quintesse IV", coll:"La risée du plombier miraculeux", date:"9 novembre 2010"},
    {title:"Ce qu'on fait avec soi", lines:["Le risque n'est pas nul,","à n'avoir prévu de vivre,","parce que c'est la question,","en termes de sécurité sanitaire…","intimement liée au moralement correct…"],
     anal:"anonyme · Quintesse XXIII", coll:"Partager sa façon de voir", date:"22 juillet 2014"},
    {title:"À ce qu'on y teste", lines:["S'épuisante à se faire violence,","fontaine qu'on érige en statue,","en aucun mot qu'on adresse,","autour de sa meilleure amie","… devoir en passer par là."],
     anal:"anonyme · Quintesse XIX", coll:"À ce qui s'en sort", date:"25 juin 2026"}
  ];
  var last = -1;
  function draw(){
    var i; do { i = Math.floor(Math.random()*POEMS.length); } while (i===last && POEMS.length>1);
    last = i;
    var p = POEMS[i];
    document.getElementById('title').textContent = '« '+p.title+' »';
    document.getElementById('poem').innerHTML = p.lines.map(function(l){return '<span class="ln">'+l+'</span>';}).join('');
    document.getElementById('meta').innerHTML =
      '<span class="oe">Analisante :</span> '+p.anal+'<br>'+p.date+' · collection « '+p.coll+' »';
    var page = document.getElementById('page');
    page.classList.remove('run'); void page.offsetWidth; page.classList.add('run');
  }
  draw();
</script>
</body>
</html>
